function isParentOuterSenderEventForExpansion(e, exp, focusQuery) {
  if (dailyGraphMode !== "file") return false;
  if (!e || !exp) return false;

  // 只排除打开当前 expanded graph 的那条 parent edge
  if (String(e.id) !== String(exp.eventId)) {
    return false;
  }

  const focusId = normalizeTracePersonId(focusQuery);
  const senderId = normalizeTracePersonId(e.sender_id);
  const parentFocusId = normalizeTracePersonId(exp.parentFocus);

  const receiverIds = (e.receivers || []).map(r =>
    normalizeTracePersonId(r.id)
  );

  // 当前 expanded graph 的 focus person 是这条 event 的 sender，
  // 并且这条 event 的 receiver 是上一层 graph 的 focus。
  // 例如 Gabriel → Zoey，展开 Gabriel 时排除这条 event。
  return (
    senderId === focusId &&
    (
      !parentFocusId ||
      receiverIds.includes(parentFocusId)
    )
  );
}

function getExpansionCenter(exp) {
  // upstream / downstream / file auto chain:
  // 新 graph 的圆心就是被点击的 node 本身
  if (
    Number.isFinite(exp.x) &&
    Number.isFinite(exp.y)
  ) {
    return {
      x: exp.x,
      y: exp.y
    };
  }

  const r = typeof DAILY_OUTER_RADIUS !== "undefined"
    ? DAILY_OUTER_RADIUS
    : 120;

  return {
    x: margin.left + r + 120,
    y: 180 + r
  };
}

function isChainBridgeEdgeForExpansion(e, exp, focusQuery) {
  if (!e || !exp) return false;

  const focusId = normalizeTracePersonId(focusQuery);
  const parentFocusId = normalizeTracePersonId(exp.parentFocus);

  if (!focusId || !parentFocusId) return false;

  const senderId = normalizeTracePersonId(e.sender_id);

  const receiverIds = (e.receivers || [])
    .map(r => normalizeTracePersonId(r.id))
    .filter(Boolean);

  const sameEvent =
    String(e.id) === String(exp.eventId);

  /*
   * 当前 expansion graph 是 a
   * parentFocus 是 b
   * bridge edge 是 a -> b
   *
   * 这条 edge 已经在 b graph 的 outer arc 上表达过：
   * b outer arc node = a
   *
   * 所以在 a graph 里面不要再画成 middle outgoing。
   */
  return (
    sameEvent &&
    senderId === focusId &&
    receiverIds.includes(parentFocusId)
  );
}

function drawNodeExpansion(g, exp) {
  const focusQuery = exp.person;
  const focusId = normalizeTracePersonId(focusQuery);
  const day = exp.day;

  const expansionMode = exp.mode || "upstream";
  const isDownstream =
    expansionMode === "downstream";

  /*
   * Middle node 展开的 downstream graph 使用更小的 disk。
   * Upstream expansion 保持原尺寸。
   */
  const innerR = isDownstream
    ? 22
    : (
        typeof DAILY_INNER_RADIUS !== "undefined"
          ? DAILY_INNER_RADIUS
          : 30
      );

  const outerR =
    typeof DAILY_OUTER_RADIUS !== "undefined"
      ? DAILY_OUTER_RADIUS
      : 120;

  const middleRadius = DAILY_MIDDLE_RADIUS;

  const center = getExpansionCenter(exp);

  const graphInstanceKey =
    exp.graphInstanceKey ||
    [
      "expansion",
      expansionMode,
      day,
      focusId,
      exp.eventId || "",
      center.x.toFixed(1),
      center.y.toFixed(1)
    ].join("||");

  const graphG = g.append("g")
    .attr("class", "person-graph")
    .attr("data-person", focusId)
    .attr("data-graph-key", graphInstanceKey);

  const dayEvents = dailyGraphBaseEvents.filter(e => {
    if (
      d3.timeFormat("%m-%d")(e.date) !== day
    ) {
      return false;
    }

    if (!eventPassesDailyGraphBaseFilters(e)) {
      return false;
    }

    if (
      dailyGraphMode === "file" &&
      !eventPassesFileDateWindow(e)
    ) {
      return false;
    }

    return true;
  });

  const bridgeEvents = dayEvents.filter(e =>
    isChainBridgeEdgeForExpansion(
      e,
      exp,
      focusQuery
    )
  );

  const nonBridgeEvents = dayEvents.filter(e =>
    !isChainBridgeEdgeForExpansion(
      e,
      exp,
      focusQuery
    )
  );

  const cutoffTime =
    exp.clickedTime
      ? new Date(exp.clickedTime)
      : (
          exp.anchorDate
            ? new Date(exp.anchorDate)
            : null
        );

  const selfEvents = nonBridgeEvents.filter(e =>
    isSelfActivityForFocus(
      e,
      focusQuery
    )
  );

  const outgoingEvents = nonBridgeEvents.filter(e =>
    isOutgoingFromFocus(
      e,
      focusQuery
    )
  );

  const incomingEvents = nonBridgeEvents.filter(e => {
    if (
      !isIncomingToFocus(
        e,
        focusQuery
      )
    ) {
      return false;
    }

    if (
      dailyGraphMode === "file" &&
      cutoffTime &&
      e.date > cutoffTime
    ) {
      return false;
    }

    return true;
  });

  if (
    !bridgeEvents.length &&
    !selfEvents.length &&
    !incomingEvents.length &&
    !outgoingEvents.length
  ) {
    return;
  }

  const allFocusEvents = [
    ...bridgeEvents,
    ...selfEvents,
    ...incomingEvents,
    ...outgoingEvents
  ];

  const diskColor = drawPersonDisk(
    graphG,
    center.x,
    center.y,
    innerR,
    focusQuery,
    allFocusEvents
  );

  addDiskInteractionOverlay(
  graphG,
  center.x,
  center.y,
  innerR,
  focusQuery,
  graphInstanceKey,
  day
);

  drawTwoLinePersonLabel(
    graphG,
    center.x,
    center.y,
    exp.personName || focusQuery
  );

  /*
   * Downstream graph 的 name label 缩小。
   * 只修改当前 graph 的直接 text。
   */
  if (isDownstream) {
    graphG
      .selectAll("text")
      .filter(function () {
        return this.parentNode === graphG.node();
      })
      .attr("font-size", 8);
  }

  /*
   * Chain bridge event：
   * 不在 middle arc 重复画，
   * 但保留在当前人的 inner disk 上。
   */
  bridgeEvents.forEach(e => {
    const angle =
      dateToDayAngle(e.date);

    const innerP = polar(
      center.x,
      center.y,
      innerR,
      angle
    );

    drawDailyActivityNode(
      graphG,
      innerP.x,
      innerP.y,
      e,
      focusQuery,
      center.x,
      center.y,
      innerR,
      angle
    );
  });

  /*
   * Inner self activity
   */
  selfEvents.forEach(e => {
    const angle =
      dateToDayAngle(e.date);

    const innerP = polar(
      center.x,
      center.y,
      innerR,
      angle
    );

    drawDailyActivityNode(
      graphG,
      innerP.x,
      innerP.y,
      e,
      focusQuery,
      center.x,
      center.y,
      innerR,
      angle
    );
  });

  /*
   * Downstream expansion：
   * 点击 middle node 后，只画当前人的 self 和 outgoing。
   */
  if (expansionMode === "downstream") {
    /*
     * Middle 展开的 arc 更小。
     */
    const downstreamOuterR = 50;

    const outerArcExtent =
      getArcExtentFromEvents(
        outgoingEvents,
        5
      );

    if (outerArcExtent) {
      drawOuterArc(
        graphG,
        center.x,
        center.y,
        downstreamOuterR,
        outerArcExtent.start,
        outerArcExtent.end,
        diskColor,
        0.45,
        "outer"
      );
    }

    outgoingEvents.forEach(e => {
      const angle =
        dateToDayAngle(e.date);

      const innerP = polar(
        center.x,
        center.y,
        innerR,
        angle
      );

      const outerP = polar(
        center.x,
        center.y,
        downstreamOuterR,
        angle
      );

      const receivers =
        getOutgoingReceiversForFocus(
          e,
          focusQuery
        );

      receivers.forEach(receiver => {
        const receiverId =
          normalizeTracePersonId(
            receiver.id ||
            receiver.name
          );

        const isSelectedTrace =
          isDownstreamExpansionSelected(
            graphInstanceKey,
            receiverId,
            e
          );

        /*
         * Direction:
         * inner 是发送方，因此起点粗；
         * receiver arc 是接收方，因此终点尖。
         *
         * Middle/downstream trace 使用蓝色。
         */
        drawFlowTriangle(
          graphG,
          innerP.x,
          innerP.y,
          outerP.x,
          outerP.y,
          isSelectedTrace
            ? "#2563eb"
            : TRACE_INACTIVE_COLOR,
          isSelectedTrace
            ? TRACE_ACTIVE_OPACITY
            : TRACE_INACTIVE_OPACITY,
          isSelectedTrace ? 7 : 5,
          4,
          4,
          isSelectedTrace
            ? "daily-flow daily-middle-flow-active"
            : "daily-flow daily-middle-flow"
        );

        drawClickableMiddleReceiverNode(
          graphG,
          outerP.x,
          outerP.y,
          receiver,
          e,
          focusQuery,
          angle,
          (exp.depth || 1) + 1,
          exp.rootWindow ||
            exp.window ||
            null,
          center.x,
          center.y,
          graphInstanceKey,
          downstreamOuterR
        );
      });
    });

    return;
  }

  /*
   * Upstream expansion：
   * 完整三层。
   */

  /*
   * Middle arc：
   * 当前 focus 发送给其他人。
   */
  const middleArcExtent =
    getArcExtentFromEvents(
      outgoingEvents,
      5
    );

  if (middleArcExtent) {
    drawOuterArc(
      graphG,
      center.x,
      center.y,
      middleRadius,
      middleArcExtent.start,
      middleArcExtent.end,
      diskColor,
      0.34,
      "middle"
    );
  }

  outgoingEvents.forEach(e => {
    const angle =
      dateToDayAngle(e.date);

    const innerP = polar(
      center.x,
      center.y,
      innerR,
      angle
    );

    const middleP = polar(
      center.x,
      center.y,
      middleRadius,
      angle
    );

    const receivers =
      getOutgoingReceiversForFocus(
        e,
        focusQuery
      );

    receivers.forEach(receiver => {
      const receiverId =
        normalizeTracePersonId(
          receiver.id ||
          receiver.name
        );

      const isSelectedTrace =
        isDownstreamExpansionSelected(
          graphInstanceKey,
          receiverId,
          e
        );

      /*
       * Direction:
       * inner focus 是发送方，粗；
       * middle receiver 是接收方，尖。
       *
       * Middle trace 高亮为蓝色。
       */
      drawFlowTriangle(
        graphG,
        innerP.x,
        innerP.y,
        middleP.x,
        middleP.y,
        isSelectedTrace
          ? "#2563eb"
          : TRACE_INACTIVE_COLOR,
        isSelectedTrace
          ? TRACE_ACTIVE_OPACITY
          : TRACE_INACTIVE_OPACITY,
        isSelectedTrace ? 7 : 5,
        4,
        4,
        isSelectedTrace
          ? "daily-flow daily-middle-flow-active"
          : "daily-flow daily-middle-flow"
      );

      drawClickableMiddleReceiverNode(
        graphG,
        middleP.x,
        middleP.y,
        receiver,
        e,
        focusQuery,
        angle,
        (exp.depth || 1) + 1,
        exp.rootWindow ||
          exp.window ||
          null,
        center.x,
        center.y,
        graphInstanceKey,
        middleRadius
      );
    });
  });

  /*
   * Outer arc：
   * 其他人发送给当前 focus。
   */
  const outerArcExtent =
    getArcExtentFromEvents(
      incomingEvents,
      5
    );

  if (outerArcExtent) {
    drawOuterArc(
      graphG,
      center.x,
      center.y,
      outerR,
      outerArcExtent.start,
      outerArcExtent.end,
      diskColor,
      0.45,
      "outer"
    );
  }

  incomingEvents.forEach(e => {
    const angle =
      dateToDayAngle(e.date);

    const innerP = polar(
      center.x,
      center.y,
      innerR,
      angle
    );

    const outerP = polar(
      center.x,
      center.y,
      outerR,
      angle
    );

    const rootWindow =
      exp.rootWindow ||
      exp.window ||
      (
        dailyGraphMode === "person"
          ? getAnchorWindowForEvent(e)
          : dailyGraphConcreteFileWindow
      );

    if (!rootWindow) {
      console.warn(
        "SKIP EXPANSION INCOMING NODE: no rootWindow",
        {
          mode: dailyGraphMode,
          eventId: e.id,
          time: e.date,
          focusQuery
        }
      );

      return;
    }

    const upstreamSenders =
      getExternalSendersForFocus(
        e,
        focusQuery
      );

    const hasPlannedChainEdge =
      dailyGraphMode === "file" &&
      upstreamSenders.some(sender => {
        const senderId =
          normalizeTracePersonId(
            sender.id ||
            sender.name
          );

        return isExpectedFileTemporalEdgeForGraph(
          graphInstanceKey,
          day,
          senderId,
          focusId,
          e.id
        );
      });

    if (hasPlannedChainEdge) {
      drawDailyActivityNode(
        graphG,
        innerP.x,
        innerP.y,
        e,
        focusQuery,
        center.x,
        center.y,
        innerR,
        angle,
        {
          isChainEndpoint: true
        }
      );
    }

    upstreamSenders.forEach(sender => {
      const depth =
        (exp.depth || 1) + 1;

      const senderId =
        normalizeTracePersonId(
          sender.id ||
          sender.name
        );

      const isExpectedFileEdge =
        dailyGraphMode === "file" &&
        isExpectedFileTemporalEdgeForGraph(
          graphInstanceKey,
          day,
          senderId,
          focusId,
          e.id
        );

      const isSelectedTrace =
        isExpandedTraceNode(
          sender,
          day,
          outerP.x,

function hourToAngle(hour) {
  return -Math.PI / 2 + (hour / 24) * Math.PI * 2;
}

function dateToDayAngle(date) {
  const hour = date.getHours();
  const minute = date.getMinutes();
  const second = date.getSeconds();

  const t = hour + minute / 60 + second / 3600;

  return hourToAngle(t);
}

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function normalizeAngle(a) {
  const twoPi = Math.PI * 2;
  return ((a % twoPi) + twoPi) % twoPi;
}

function makeArcPath(cx, cy, r, startAngle, endAngle) {
  const twoPi = Math.PI * 2;

  let start = normalizeAngle(startAngle);
  let end = normalizeAngle(endAngle);

  if (end < start) end += twoPi;

  const largeArc = end - start > Math.PI ? 1 : 0;

  const p1 = polar(cx, cy, r, start);
  const p2 = polar(cx, cy, r, end);

  return `
    M ${p1.x} ${p1.y}
    A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y}
  `;
}

function getActivityArcAngles(events) {
  const pad = 0.14; // 单点时的小弧长度，可调大/小

  if (!events || !events.length) return null;

  const angles = events
    .map(e => normalizeAngle(dateToDayAngle(e.date)))
    .sort((a, b) => a - b);

  if (angles.length === 1) {
    return {
      start: angles[0] - pad,
      end: angles[0] + pad
    };
  }

  // 找最大空档，然后画它的反面：也就是覆盖所有节点的连续弧
  let maxGap = -1;
  let gapStartIndex = 0;

  for (let i = 0; i < angles.length; i++) {
    const a1 = angles[i];
    const a2 = angles[(i + 1) % angles.length] + (i === angles.length - 1 ? Math.PI * 2 : 0);
    const gap = a2 - a1;

    if (gap > maxGap) {
      maxGap = gap;
      gapStartIndex = i;
    }
  }

  const start = angles[(gapStartIndex + 1) % angles.length];
  let end = angles[gapStartIndex];

  if (end < start) end += Math.PI * 2;

  return { start, end };
}

function drawActivityArc(g, cx, cy, r, events, color = "#eeeeee") {
  const arc = getActivityArcAngles(events);
  if (!arc) return;

  g.append("path")
    .attr("d", makeArcPath(cx, cy, r, arc.start, arc.end))
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 0.2)
    .attr("stroke-linecap", "round")
    .attr("opacity", 0.9);
}

function getArcExtentFromEvents(events, padMinutes = 1) {
  const validDates = (events || [])
    .map(e => e.date)
    .filter(d => d instanceof Date && !Number.isNaN(d.getTime()))
    .sort((a, b) => a - b);

  if (!validDates.length) return null;

  const first = validDates[0];
  const last = validDates[validDates.length - 1];

  const padMs = padMinutes * 60 * 1000;

  return {
    start: new Date(first.getTime() - padMs),
    end: new Date(last.getTime() + padMs),
    first,
    last
  };
}

function drawOuterArc(
  g,
  cx,
  cy,
  r,
  startDate,
  endDate,
  color = "#eeeeee",
  opacity = 0.4,
  layerType = "outer"
) {
  if (
    !(startDate instanceof Date) ||
    !(endDate instanceof Date) ||
    Number.isNaN(startDate.getTime()) ||
    Number.isNaN(endDate.getTime())
  ) {
    return;
  }

  // -------------------------------
  // 1. 细 arc：完整 outer node 动态范围
  // -------------------------------
  const startAngle = dateToDayAngle(startDate);
  const endAngle = dateToDayAngle(endDate);

  g.append("path")
    .attr(
      "d",
      makeArcPath(
        cx,
        cy,
        r,
        startAngle,
        endAngle
      )
    )
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 0.2)
    .attr("stroke-linecap", "round")
    .attr("opacity", opacity)
    .attr("pointer-events", "none")
    .attr("class", "daily-outer-activity-arc");

  // -------------------------------
  // 2. 加粗 arc：只画动态范围和 08:00–17:00 的交集
  // -------------------------------
  const workStart = new Date(startDate);
  workStart.setHours(8, 0, 0, 0);

  const workEnd = new Date(startDate);
  workEnd.setHours(17, 0, 0, 0);

  const boldStart = new Date(
    Math.max(startDate.getTime(), workStart.getTime())
  );

  const boldEnd = new Date(
    Math.min(endDate.getTime(), workEnd.getTime())
  );

  // 没有交集就不画粗 arc
  if (boldStart.getTime() >= boldEnd.getTime()) {
    return;
  }

  const boldStartAngle = dateToDayAngle(boldStart);
  const boldEndAngle = dateToDayAngle(boldEnd);

  g.append("path")
    .attr(
      "d",
      makeArcPath(
        cx,
        cy,
        r,
        boldStartAngle,
        boldEndAngle
      )
    )
    .attr("fill", "none")
    .attr("stroke", color)
    .attr(
  "stroke-width",
  layerType === "middle" ? 0.8 : 1.5
)
    .attr("stroke-linecap", "round")
    .attr("opacity", opacity * 0.75)
    .attr("pointer-events", "none")
    .attr("class", "daily-workhour-arc");
}

function drawFlowTriangle(
  g,
  x1,
  y1,
  x2,
  y2,
  color,
  opacity = 0.7,
  width = 5,
  startPadding = 4,
  endPadding = 4,
  className = "daily-flow-triangle"
) {
  const dx = x2 - x1;
  const dy = y2 - y1;

  const length = Math.sqrt(dx * dx + dy * dy);

  if (
    !Number.isFinite(length) ||
    length <= startPadding + endPadding
  ) {
    return null;
  }

  const ux = dx / length;
  const uy = dy / length;

  const px = -uy;
  const py = ux;

  const startX = x1 + ux * startPadding;
  const startY = y1 + uy * startPadding;

  const endX = x2 - ux * endPadding;
  const endY = y2 - uy * endPadding;

  const flowLength = Math.sqrt(
    (endX - startX) ** 2 +
    (endY - startY) ** 2
  );

  const halfWidth = width / 2;

  const startLeftX =
    startX + px * halfWidth;

  const startLeftY =
    startY + py * halfWidth;

  const startRightX =
    startX - px * halfWidth;

  const startRightY =
    startY - py * halfWidth;

  /*
   * 两侧控制点：
   * 起点保持较宽，然后平滑收束到终点。
   */
  const controlDistance =
    flowLength * 0.58;

  const controlHalfWidth =
    halfWidth * 0.55;

  const leftControlX =
    startX +
    ux * controlDistance +
    px * controlHalfWidth;

  const leftControlY =
    startY +
    uy * controlDistance +
    py * controlHalfWidth;

  const rightControlX =
    startX +
    ux * controlDistance -
    px * controlHalfWidth;

  const rightControlY =
    startY +
    uy * controlDistance -
    py * controlHalfWidth;

  const pathData = [
    `M ${startLeftX} ${startLeftY}`,
    `Q ${leftControlX} ${leftControlY}, ${endX} ${endY}`,
    `Q ${rightControlX} ${rightControlY}, ${startRightX} ${startRightY}`,
    "Z"
  ].join(" ");

  return g.append("path")
    .attr("class", className)
    .attr("d", pathData)
    .attr("fill", color)
    .attr("fill-opacity", opacity)
    .attr("stroke", "none")
    .attr("pointer-events", "none");
}
