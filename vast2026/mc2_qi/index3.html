function getValuesByPath(obj, path) {
  const parts = path.split(".");

  function step(current, idx) {
    if (current == null) return [];

    if (idx >= parts.length) {
      return [current];
    }

    const part = parts[idx];

    if (part.endsWith("[]")) {
      const key = part.slice(0, -2);
      const arr = current[key];

      if (!Array.isArray(arr)) return [];

      return arr.flatMap(item =>
        step(item, idx + 1)
      );
    }

    return step(current[part], idx + 1);
  }

  return step(obj, 0);
}


function getDailyGraphDayKey(e) {
  if (!e || !e.date) return "";
  return d3.timeFormat("%m-%d")(e.date);
}

function normalizeTracePersonId(id) {
  return (id || "")
    .replace(/^Agent\//, "")
    .toLowerCase()
    .trim();
}

function getEventTimeMs(e) {
  if (!e || !e.date) return NaN;

  const t = e.date instanceof Date
    ? e.date
    : new Date(e.date);

  return t.getTime();
}

function getPeopleIdsFromEvent(e) {
  const ids = [];

  if (e.sender_id) {
    const senderId = normalizeTracePersonId(e.sender_id);
    if (senderId) ids.push(senderId);
  }

  (e.receivers || []).forEach(r => {
    const rid = normalizeTracePersonId(r.id);
    if (rid) ids.push(rid);
  });

  return Array.from(new Set(ids));
}

function eventHasPersonId(e, personId) {
  const q = normalizeTracePersonId(personId);
  if (!q) return false;

  return getPeopleIdsFromEvent(e).includes(q);
}

function getExternalSenderIdsForFocus(e, focusPersonId) {
  return getExternalSendersForFocus(e, focusPersonId)
    .map(s => normalizeTracePersonId(s.id || s.name))
    .filter(Boolean);
}

function buildFileOccurrenceRecords(fileEvents) {
  const startRecords = [];
  const edgeRecords = [];

  fileEvents.forEach(e => {
    const day = getDailyGraphDayKey(e);
    const timeMs = getEventTimeMs(e);

    if (!day || Number.isNaN(timeMs)) return;

    const people = getPeopleIdsFromEvent(e);

    people.forEach(focusId => {
      // 这个 person 自己的 inner circle 上有 file-related event
      startRecords.push({
        day,
        focusId,
        event: e,
        eventId: e.id,
        timeMs,
        role: "inner",
        key: ["start", day, focusId, e.id, "inner"].join("||")
      });

      const upstreamIds = getExternalSenderIdsForFocus(e, focusId);

      upstreamIds.forEach(upstreamId => {
        // 这个 focus graph 的 outer circle 上有 file-related upstream node
        edgeRecords.push({
          day,
          focusId,
          upstreamId,
          event: e,
          eventId: e.id,
          timeMs,
          key: ["edge", day, upstreamId, focusId, e.id].join("||")
        });

        startRecords.push({
          day,
          focusId,
          upstreamId,
          event: e,
          eventId: e.id,
          timeMs,
          role: "outer",
          key: ["start", day, focusId, upstreamId, e.id, "outer"].join("||")
        });
      });
    });
  });

  return {
    startRecords,
    edgeRecords
  };
}

function findNearestFileUpstreamEdges({
  personId,
  currentTimeMs,
  day,
  edgeRecords,
  pathNodeKeys
}) {
  const q = normalizeTracePersonId(personId);

  if (!q || Number.isNaN(currentTimeMs)) return [];

  function makePathNodeKey(personId, timeMs) {
    return [
      day,
      normalizeTracePersonId(personId),
      Math.floor(timeMs / 1000) * 1000
    ].join("||");
  }

  const candidates = edgeRecords
    .filter(edge => {
      if (!edge) return false;
      if (edge.day !== day) return false;

      // 找 upstream -> 当前 person
      if (normalizeTracePersonId(edge.focusId) !== q) return false;

      // 允许同一时刻，只排除未来
      if (edge.timeMs > currentTimeMs) return false;

      const upstreamId = normalizeTracePersonId(edge.upstreamId);
      if (!upstreamId) return false;

      // 关键：只禁止同一个 person + 同一个 time 重复
      // 不禁止同一个 person 在不同时间再次出现
      const upstreamNodeKey = makePathNodeKey(upstreamId, edge.timeMs);

      if (pathNodeKeys && pathNodeKeys.has(upstreamNodeKey)) {
        return false;
      }

      return true;
    })
    .map(edge => ({
      edge,
      timeDiff: Math.abs(currentTimeMs - edge.timeMs)
    }))
    .sort((a, b) => {
      if (a.timeDiff !== b.timeDiff) {
        return a.timeDiff - b.timeDiff;
      }

      return b.edge.timeMs - a.edge.timeMs;
    });

  if (!candidates.length) return [];

  // 每层只取最近时间的一组
  const bestTimeMs = candidates[0].edge.timeMs;

  return candidates.filter(d =>
    d.edge.timeMs === bestTimeMs
  );
}

function expandFileUpstreamFromEvent({
  rootPersonId,
  startEvent,
  startEdge,
  day,
  edgeRecords,
  usedEdgeKeys,
  usedOuterNodeKeys,
  chainPeople,
  chainEdges,
  maxDepth = 12
}) {
  const rootId = normalizeTracePersonId(rootPersonId);
  if (!rootId) return;

  function normTime(timeMs) {
    return Math.floor(timeMs / 1000) * 1000;
  }

  function makeNodeKey(personId, timeMs) {
    return [
      day,
      normalizeTracePersonId(personId),
      normTime(timeMs)
    ].join("||");
  }

  function addChainEdge(edge, depth, timeDiff) {
    if (!edge || !edge.upstreamId) return false;

    const upstreamId = normalizeTracePersonId(edge.upstreamId);
    const focusId = normalizeTracePersonId(edge.focusId);

    if (!upstreamId || !focusId) return false;

    // 这个 outer node 已经出现在当前 chain 上
    usedOuterNodeKeys.add(
      makeNodeKey(upstreamId, edge.timeMs)
    );

    const edgeKey = edge.key;
    let added = false;

    if (!usedEdgeKeys.has(edgeKey)) {
      usedEdgeKeys.add(edgeKey);

      chainEdges.push({
        day,
        from: upstreamId,
        to: focusId,
        event: edge.event,
        eventId: edge.eventId,
        eventTimeMs: edge.timeMs,
        timeDiff,
        depth,
        key: edgeKey
      });

      added = true;
    }

    chainPeople.add(upstreamId);
    chainPeople.add(focusId);

    return added;
  }

  function expand(currentPersonId, currentTimeMs, depth, pathNodeKeys) {
    const currentId = normalizeTracePersonId(currentPersonId);

    if (!currentId) return;
    if (depth >= maxDepth) return;

    const currentNodeKey = makeNodeKey(currentId, currentTimeMs);
    const nextPathNodeKeys = new Set(pathNodeKeys || []);
    nextPathNodeKeys.add(currentNodeKey);

    const nearestEdges = findNearestFileUpstreamEdges({
      personId: currentId,
      currentTimeMs,
      day,
      edgeRecords,
      pathNodeKeys: nextPathNodeKeys
    });

    console.log("EXPAND STEP", {
      day,
      currentPersonId: currentId,
      currentTime: new Date(currentTimeMs).toISOString(),
      depth,
      nearestEdges: nearestEdges.map(d => ({
        from: d.edge.upstreamId,
        to: d.edge.focusId,
        eventId: d.edge.eventId,
        time: d.edge.event?.date,
        timeMs: d.edge.timeMs,
        timeDiff: d.timeDiff
      })),
      pathNodeKeys: Array.from(nextPathNodeKeys)
    });

    nearestEdges.forEach(({ edge, timeDiff }) => {
      const upstreamId = normalizeTracePersonId(edge.upstreamId);
      if (!upstreamId) return;

      const upstreamNodeKey = makeNodeKey(upstreamId, edge.timeMs);

      // 只防止同一个 person + 同一个 time 回环
      if (nextPathNodeKeys.has(upstreamNodeKey)) return;

      addChainEdge(edge, depth + 1, timeDiff);

      // 关键：继续往上展开
      // henry 可以在更早时间再次出现
      expand(
        upstreamId,
        edge.timeMs,
        depth + 1,
        nextPathNodeKeys
      );
    });
  }

  chainPeople.add(rootId);

  if (startEdge) {
    const upstreamId = normalizeTracePersonId(startEdge.upstreamId);
    const focusId = normalizeTracePersonId(startEdge.focusId);

    if (!upstreamId || !focusId) return;

    addChainEdge(startEdge, 1, 0);

    const startPathNodeKeys = new Set();

    // root henry at 03:52
    startPathNodeKeys.add(
      makeNodeKey(focusId, startEdge.timeMs)
    );

    // evelyn at 03:52
    startPathNodeKeys.add(
      makeNodeKey(upstreamId, startEdge.timeMs)
    );

    expand(
      upstreamId,
      startEdge.timeMs,
      1,
      startPathNodeKeys
    );

    return;
  }

  if (!startEvent) return;

  const startTimeMs = getEventTimeMs(startEvent);
  if (Number.isNaN(startTimeMs)) return;

  expand(
    rootId,
    startTimeMs,
    0,
    new Set()
  );
}

function buildFileTemporalChainsByDay(fileEvents) {
  const {
    startRecords,
    edgeRecords
  } = buildFileOccurrenceRecords(fileEvents);

  const startByDay = d3.group(startRecords, d => d.day);
  const edgeByDay = d3.group(edgeRecords, d => d.day);

  const chainsByDay = new Map();

  function normTimeMs(timeMs) {
    return Math.floor(Number(timeMs) / 1000) * 1000;
  }

  function getEdgeTask(edge) {
    return (
      edge?.event?.action ||
      edge?.event?.short_name ||
      edge?.event?.type ||
      ""
    );
  }

  function makeEventNodeKey(dayValue, personId, timeMs, task) {
    return [
      dayValue,
      normalizeTracePersonId(personId),
      normTimeMs(timeMs),
      task || ""
    ].join("||");
  }

  // 同一个 person+time+task 到另一个 person+time+task 视为同一条 event-event 子链
  function makeSubchainEdgeKey(edge) {
    if (!edge) return "";

    const fromId = normalizeTracePersonId(edge.from || edge.upstreamId);
    const toId = normalizeTracePersonId(edge.to || edge.focusId);
    const t = normTimeMs(edge.eventTimeMs || edge.timeMs);
    const task = getEdgeTask(edge);

    const fromNodeKey = makeEventNodeKey(edge.day, fromId, t, task);
    const toNodeKey = makeEventNodeKey(edge.day, toId, t, task);

    return [
      fromNodeKey,
      "->",
      toNodeKey
    ].join("||");
  }

  function findNearestPreviousReceivingEdge({
    personId,
    currentTimeMs,
    day,
    dayEdges,
    pathSubchainKeys,
    pathNodeKeys
  }) {
    const currentId = normalizeTracePersonId(personId);
    if (!currentId || Number.isNaN(currentTimeMs)) return null;

    const candidates = dayEdges
      .filter(edge => {
        if (!edge) return false;
        if (edge.day !== day) return false;

        // 找 upstream -> currentId
        // 也就是 currentId 在更早/同一时刻接收了谁
        if (normalizeTracePersonId(edge.focusId) !== currentId) {
          return false;
        }

        // 只允许当前时间之前或同一时刻
        if (edge.timeMs > currentTimeMs) {
          return false;
        }

        const upstreamId = normalizeTracePersonId(edge.upstreamId);
        if (!upstreamId) return false;

        const task = getEdgeTask(edge);

        const fromNodeKey = makeEventNodeKey(
          day,
          upstreamId,
          edge.timeMs,
          task
        );

        const toNodeKey = makeEventNodeKey(
          day,
          currentId,
          edge.timeMs,
          task
        );

        const tempSubchainKey = [
          fromNodeKey,
          "->",
          toNodeKey
        ].join("||");

        // 只防止当前 single chain 内部重复同一条 event-event 子链
        if (pathSubchainKeys.has(tempSubchainKey)) {
          return false;
        }

        // 防止同一个 person+time+task node 在当前 single chain 里反复循环
        // 但是同一个 person 不同时间可以重复出现
        if (pathNodeKeys.has(fromNodeKey)) {
          return false;
        }

        return true;
      })
      .map(edge => ({
        edge,
        timeDiff: Math.abs(currentTimeMs - edge.timeMs)
      }))
      .sort((a, b) => {
        if (a.timeDiff !== b.timeDiff) {
          return a.timeDiff - b.timeDiff;
        }

        // 同样近时，晚的优先
        if (a.edge.timeMs !== b.edge.timeMs) {
          return b.edge.timeMs - a.edge.timeMs;
        }

        return String(b.edge.eventId).localeCompare(String(a.edge.eventId));
      });

    return candidates.length ? candidates[0].edge : null;
  }

  function buildSingleChainFromRootOuterEdge({
    startEdge,
    day,
    dayEdges,
    maxDepth = 30
  }) {
    const singleChain = [];

    const pathSubchainKeys = new Set();
    const pathNodeKeys = new Set();

    let currentEdge = startEdge;
    let depth = 1;

    while (currentEdge && depth <= maxDepth) {
      const upstreamId = normalizeTracePersonId(currentEdge.upstreamId);
      const focusId = normalizeTracePersonId(currentEdge.focusId);

      if (!upstreamId || !focusId) break;

      const task = getEdgeTask(currentEdge);

      const fromNodeKey = makeEventNodeKey(
        day,
        upstreamId,
        currentEdge.timeMs,
        task
      );

      const toNodeKey = makeEventNodeKey(
        day,
        focusId,
        currentEdge.timeMs,
        task
      );

      const currentSubchainKey = [
        fromNodeKey,
        "->",
        toNodeKey
      ].join("||");

      if (pathSubchainKeys.has(currentSubchainKey)) {
        break;
      }

      singleChain.push({
        day,
        from: upstreamId,
        to: focusId,
        event: currentEdge.event,
        eventId: currentEdge.eventId,
        eventTimeMs: currentEdge.timeMs,
        timeDiff: 0,
        depth,
        key: currentEdge.key,
        subchainKey: currentSubchainKey
      });

      pathSubchainKeys.add(currentSubchainKey);
      pathNodeKeys.add(fromNodeKey);
      pathNodeKeys.add(toNodeKey);

      // 关键：
      // 当前 edge 是 upstream -> focus。
      // 下一步要看 upstream 这个 person 在更早/同一时刻接收了谁。
      // 例如：
      // evelyn -> henry 03:52
      // 下一步找 henry -> evelyn 03:45
      currentEdge = findNearestPreviousReceivingEdge({
        personId: upstreamId,
        currentTimeMs: currentEdge.timeMs,
        day,
        dayEdges,
        pathSubchainKeys,
        pathNodeKeys
      });

      depth += 1;
    }

    return singleChain;
  }

  startByDay.forEach((dayStartsRaw, day) => {
    const dayStarts = dayStartsRaw
      .slice()
      .sort((a, b) => a.timeMs - b.timeMs);

    const dayEdges = (edgeByDay.get(day) || [])
      .slice()
      .sort((a, b) => b.timeMs - a.timeMs);

    const chains = [];

    // 跨 root person 的去重。
    // 注意：不是 person 去重，而是 event-event subchain 去重。
    const globalUsedSubchainKeys = new Set();

    // root person:
    // 从所有 receiving outer file event 的 receiver/focusId 中选。
    // 谁的最新 receiving event 最晚，谁先作为 root。
    const rootCandidates = Array.from(
      d3.rollup(
        dayEdges,
        edges => ({
          latestOuterTime: d3.max(edges, edge => edge.timeMs),
          edgeCount: edges.length
        }),
        edge => normalizeTracePersonId(edge.focusId)
      ),
      ([personId, info]) => ({
        personId,
        latestOuterTime: info.latestOuterTime,
        edgeCount: info.edgeCount
      })
    )
      .filter(d => d.personId)
      .sort((a, b) => {
        if (a.latestOuterTime !== b.latestOuterTime) {
          return b.latestOuterTime - a.latestOuterTime;
        }

        return b.edgeCount - a.edgeCount;
      });

    console.log("ROOT CANDIDATES ORDER", {
      day,
      roots: rootCandidates.map(d => ({
        rootPersonId: d.personId,
        latestOuterTime: d.latestOuterTime,
        latestOuterDate: Number.isFinite(d.latestOuterTime)
          ? new Date(d.latestOuterTime)
          : null,
        edgeCount: d.edgeCount
      }))
    });

    rootCandidates.forEach(rootCandidate => {
      const rootPersonId = rootCandidate.personId;

      const rootStarts = dayStarts.filter(s =>
        normalizeTracePersonId(s.focusId) === rootPersonId
      );

      // 当前 root person 独立建 chain
      const chainPeople = new Set([rootPersonId]);
      const chainEdges = [];

      // 当前 root 内部已经画过的 subchain
      const localUsedSubchainKeys = new Set();

      // 当前 root 的所有 outer nodes：
      // 例如 henry 的 outer nodes:
      // evelyn 03:52, zoey 03:05, david 00:12
      const rootOuterEdges = dayEdges
        .filter(edge =>
          normalizeTracePersonId(edge.focusId) === rootPersonId
        )
        .sort((a, b) => {
          if (a.timeMs !== b.timeMs) {
            return b.timeMs - a.timeMs;
          }

          return String(b.eventId).localeCompare(String(a.eventId));
        });

      console.log("ROOT OUTER EDGES ORDER", {
        day,
        rootPersonId,
        edges: rootOuterEdges.map(edge => ({
          from: edge.upstreamId,
          to: edge.focusId,
          eventId: edge.eventId,
          time: edge.event?.date,
          timeMs: edge.timeMs,
          task: getEdgeTask(edge),
          key: edge.key
        }))
      });

      rootOuterEdges.forEach(startEdge => {
        if (!startEdge || !startEdge.key) return;

        // 从当前 root 的一个 outer node 开始，追一条完整 single chain
        const singleChain = buildSingleChainFromRootOuterEdge({
          startEdge,
          day,
          dayEdges
        });

        if (!singleChain.length) return;

        const singleChainSubKeys = singleChain.map(edge =>
          edge.subchainKey || makeSubchainEdgeKey(edge)
        );

        // 如果这条 single chain 完全包含在当前 root 前面已经画过的 chain 中，
        // 或者完全包含在其他 root 前面已经画过的 chain 中，
        // 就跳过。
        const coveredByLocal =
          singleChainSubKeys.length > 0 &&
          singleChainSubKeys.every(key => localUsedSubchainKeys.has(key));

        const coveredByGlobal =
          singleChainSubKeys.length > 0 &&
          singleChainSubKeys.every(key => globalUsedSubchainKeys.has(key));

        console.log("TRY SINGLE CHAIN FROM ROOT OUTER EDGE", {
          day,
          rootPersonId,
          startFrom: startEdge.upstreamId,
          startTo: startEdge.focusId,
          startTime: startEdge.event?.date,
          singleChain: singleChain.map(edge => ({
            from: edge.from,
            to: edge.to,
            eventId: edge.eventId,
            time: edge.event?.date,
            subchainKey: edge.subchainKey
          })),
          coveredByLocal,
          coveredByGlobal
        });

        if (coveredByLocal || coveredByGlobal) {
          console.log("SKIP SINGLE CHAIN BECAUSE ALREADY COVERED", {
            day,
            rootPersonId,
            startFrom: startEdge.upstreamId,
            startTime: startEdge.event?.date,
            coveredByLocal,
            coveredByGlobal
          });

          return;
        }

        // 不是完全重复的 single chain，保留其中还没画过的 subchain
        singleChain.forEach(edge => {
          const subchainKey = edge.subchainKey || makeSubchainEdgeKey(edge);

          if (localUsedSubchainKeys.has(subchainKey)) return;
          if (globalUsedSubchainKeys.has(subchainKey)) return;

          localUsedSubchainKeys.add(subchainKey);
          globalUsedSubchainKeys.add(subchainKey);

          chainEdges.push(edge);

          chainPeople.add(normalizeTracePersonId(edge.from));
          chainPeople.add(normalizeTracePersonId(edge.to));
        });
      });

      if (!chainEdges.length) {
        console.log("SKIP EMPTY ROOT CHAIN", {
          day,
          rootPersonId
        });

        return;
      }

      chains.push({
        day,
        rootPersonId,
        starts: rootStarts,
        edges: chainEdges,
        people: chainPeople
      });
    });

    chainsByDay.set(day, chains);
  });

  console.log("FILE TEMPORAL CHAINS BUILT", {
    byDay: Array.from(chainsByDay.entries()).map(([day, chains]) => ({
      day,
      chainCount: chains.length,
      roots: chains.map(c => c.rootPersonId),
      chains: chains.map(c => ({
        root: c.rootPersonId,
        edgeCount: c.edges.length,
        people: Array.from(c.people),
        edges: c.edges.map(edge => ({
          from: edge.from,
          to: edge.to,
          eventId: edge.eventId,
          eventTime: edge.event?.date,
          eventTimeMs: edge.eventTimeMs,
          task: getEdgeTask(edge),
          subchainKey: edge.subchainKey || makeSubchainEdgeKey(edge),
          depth: edge.depth
        }))
      }))
    }))
  });

  return chainsByDay;
}

function isPlannedFileTemporalEdge(day, fromId, toId, eventId) {
  const key = [
    "edge",
    day,
    normalizeTracePersonId(fromId),
    normalizeTracePersonId(toId),
    eventId
  ].join("||");

  return dailyGraphFilePlannedEdgeKeys.has(key);
}

function maybeAutoAddTemporalFileExpansion({
  sender,
  e,
  focusQuery,
  x,
  y,
  angle,
  depth,
  rootWindow
}) {
  if (dailyGraphMode !== "file") return;
  if (!sender || !e || !e.date || !rootWindow) return;

  const day = getDailyGraphDayKey(e);

  const senderId = normalizeTracePersonId(
    sender.id || sender.name
  );

  const focusId = normalizeTracePersonId(focusQuery);

  if (!day || !senderId || !focusId) return;

  // 关键：只自动展开 temporal chain planner 里已经决定要画的 edge
  if (
    !isPlannedFileTemporalEdge(
      day,
      senderId,
      focusId,
      e.id
    )
  ) {
    return;
  }

  const autoKey = [
    "auto-temporal-file",
    day,
    senderId,
    focusId,
    e.id
  ].join("||");

  if (dailyGraphFileAutoExpandedKeys.has(autoKey)) {
    return;
  }

  dailyGraphFileAutoExpandedKeys.add(autoKey);

  const outerWindow = buildClickedWindowForExpansion(
    e.date,
    rootWindow
  );

  const innerWindow = buildInnerWindowForExpansion(
    e.date,
    rootWindow
  );

  if (
    !outerWindow ||
    !outerWindow.start ||
    !outerWindow.end ||
    !innerWindow ||
    !innerWindow.start ||
    !innerWindow.end
  ) {
    console.warn("AUTO EXPANSION SKIP: invalid window", {
      day,
      senderId,
      focusId,
      eventId: e.id,
      outerWindow,
      innerWindow,
      rootWindow
    });
    return;
  }

  const clickedTime = e.date instanceof Date
    ? e.date.toISOString()
    : new Date(e.date).toISOString();

  const expKey = [
    senderId,
    day,
    x.toFixed(1),
    y.toFixed(1),
    rootWindow.start.toISOString(),
    clickedTime
  ].join("||");

  const alreadyExists = dailyGraphExpansions.some(exp =>
    exp.key === expKey
  );

  if (alreadyExists) {
    return;
  }

  dailyGraphExpansions.push({
    key: expKey,
    autoFileChain: true,

    personId: senderId,
    personName: sender.name || sender.id || senderId,
    day,

    clickedX: x,
    clickedY: y,
    clickedAngle: angle,
    depth: depth + 1,
    clickedTime,

    // outer circle 用的 window
    windowStart: outerWindow.start.toISOString(),
    windowEnd: outerWindow.end.toISOString(),

    // inner circle 用的 window
    innerWindowStart: innerWindow.start.toISOString(),
    innerWindowEnd: innerWindow.end.toISOString(),

    // debug 信息
    parentFocus: focusId,
    eventId: e.id
  });

  console.log("AUTO TEMPORAL FILE EXPANSION ADDED", {
    day,
    from: senderId,
    to: focusId,
    eventId: e.id,
    eventTime: e.date,
    expKey
  });
}

function normalizeTracePersonId(id) {
  return (id || "")
    .replace(/^Agent\//, "")
    .toLowerCase()

}

function getPeopleIdsFromEvent(e) {
  const ids = [];

  if (e.sender_id) {
    const senderId = normalizeTracePersonId(e.sender_id);
    if (senderId) ids.push(senderId);
  }

  (e.receivers || []).forEach(r => {
    const rid = normalizeTracePersonId(r.id);
    if (rid) ids.push(rid);
  });

  return Array.from(new Set(ids));
}

function buildFileFocusByDay(fileEvents) {
  const map = new Map();

  const fileEventsByDay = d3.group(
    fileEvents,
    e => getDailyGraphDayKey(e)
  );

  fileEventsByDay.forEach((eventsOfDay, day) => {
    if (!day) return;

    const people = getPeopleForFile(
      dailyGraphFileQuery,
      eventsOfDay
    );

    const peopleSet = new Set();

    people.forEach(p => {
      const id = (p.id || "")
        .replace(/^Agent\//, "")
        .toLowerCase()
        .trim();

      if (id) {
        peopleSet.add(id);
      }
    });

    map.set(day, peopleSet);
  });

  return map;
}

function eventTouchesFileFocusPeopleOnSameDay(e) {
  const day = getDailyGraphDayKey(e);
  if (!day) return false;

  const peopleSet = dailyGraphFileFocusByDay.get(day);

  if (!peopleSet || !peopleSet.size) {
    return false;
  }

  return Array.from(peopleSet).some(personId =>
    isPersonSender(e, personId) ||
    isPersonReceiver(e, personId)
  );
}

function getAllFileFocusPeople() {
  const all = new Set();

  dailyGraphFileFocusByDay.forEach(peopleSet => {
    peopleSet.forEach(id => all.add(id));
  });

  return Array.from(all);
}

function fillCheckboxGroup(selector, values) {
  const box = d3.select(selector);
  box.selectAll("*").remove();

  box.append("label")
    .attr("class", "check-item")
    .html(`<input type="checkbox" value="ALL" checked> ALL`);

  const items = box.selectAll("label.extra")
    .data(values)
    .enter()
    .append("label")
    .attr("class", "check-item extra");

  items.html(d => `<input type="checkbox" value="${d}"> ${d}`);

  box.selectAll("input").on("change", function() {
    const value = this.value;

    if (value === "ALL" && this.checked) {
      box.selectAll("input").property("checked", false);
      d3.select(this).property("checked", true);
    } else if (value !== "ALL" && this.checked) {
      box.select('input[value="ALL"]').property("checked", false);
    }

    const checked = box.selectAll("input:checked").nodes();

    if (checked.length === 0) {
      box.select('input[value="ALL"]').property("checked", true);
    }

    rerenderCurrentTab();
  });
}

function getCheckedValues(selector) {

  }

  return new Set(values);
}

function getFileDateWindow() {
  const startValue = d3.select("#fileStartDateFilter").property("value");
  const endValue = d3.select("#fileEndDateFilter").property("value");

  if (!startValue && !endValue) {
    return {
      start: null,
      end: null
    };
  }

  const startDate = startValue || endValue;
  const endDate = endValue || startValue;

  const start = new Date(`${startDate}T00:00:00`);
  const end = new Date(`${endDate}T23:59:59`);

  return {
    start,
    end
  };
}

function eventPassesFileDateWindow(e) {
  if (!e || !e.date) return false;

  const fileWindow = getFileDateWindow();

  if (!fileWindow.start || !fileWindow.end) {
    return true;
  }

  const t = e.date instanceof Date
    ? e.date
    : new Date(e.date);

  if (Number.isNaN(t.getTime())) return false;

  return t >= fileWindow.start && t <= fileWindow.end;
}

function isMatchedFileEventInRange(e, fileQuery) {
  if (!e || !e.date) return false;

  if (!eventPassesFileDateWindow(e)) {
    return false;
  }

  if (!isFileEvent(e, fileQuery)) {
    return false;
  }

  return true;
}

function getConcreteFileWindow(events) {
  const { start, end } = getFileDateWindow();

  const minDate = d3.min(events, d => d.date);
  const maxDate = d3.max(events, d => d.date);

  return {
    start: start || minDate || new Date("2046-01-01T00:00:00"),
    end: end || maxDate || new Date("2046-12-31T23:59:59")
  };
}

function render() {
  currentTab = "overview";

  currentData = level1Data;

  if (!currentData.length || !width) return;

  visibleData = getFilteredData();

  if (!visibleData.length) {
    clearCanvasAndSvg(document.getElementById("container").clientHeight);
    return;
  }

  const times = d3.extent(visibleData, d => d.date);
  const yDomain = Array.from(new Set(visibleData.map(d => d.pair))).sort();

  xScale = d3.scaleTime()
    .domain(times)
    .range([margin.left, width - margin.right]);

  const chartHeight = buildGroupedYMap(yDomain);

  height = Math.max(
    document.getElementById("container").clientHeight,
    chartHeight
  );

  setupCanvasSvg(height);
  clearCanvasAndSvg(height);

  yScale = key => yMap.get(key);
  colorScale = actionColor;

  drawAxes(yDomain);
  drawCanvasPoints();
  buildQuadtree();
}

function buildGroupedYMap(yDomain) {
  yMap = new Map();

  const innerGap = 11;
  const groupGap = 26;

  const groups = d3.group(yDomain, d => {
    if (d.includes(" → ")) return d.split(" → ")[0];
    return d;
  });

  let y = margin.top;
  const senderGroups = Array.from(groups.keys()).sort();

  for (const sender of senderGroups) {
    const rows = groups.get(sender).sort();

    for (const row of rows) {
      yMap.set(row, y);
      y += innerGap;
    }

    y += groupGap;
  }

  return y + margin.bottom + 30;
}

function setupCanvasSvg(h) {
  canvas.width = width * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;

  canvas.style.width = width + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(
    window.devicePixelRatio,
    0,
    0,
    window.devicePixelRatio,
    0,
    0
  );

  svg.attr("width", width).attr("height", h);
}

function clearCanvasAndSvg(h) {
  ctx.clearRect(0, 0, width, h);
  svg.selectAll("*").remove();
}

function drawAxes(yDomain) {
  const xAxis = d3.axisBottom(xScale)
    .ticks(8)
    .tickFormat(d3.timeFormat("%m-%d %H:%M"));

  svg.append("g")
    .attr("transform", `translate(0, ${height - margin.bottom})`)
    .call(xAxis);

  const yLabelG = svg.append("g")
    .attr("transform", `translate(${margin.left}, 0)`);

  for (const label of yDomain) {
    const y = yScale(label);
    if (y === undefined) continue;

    yLabelG.append("text")
      .attr("x", -8)
      .attr("y", y)
      .attr("text-anchor", "end")
      .attr("dominant-baseline", "middle")
      .attr("font-size", "10px")
      .text(label);
  }

  svg.append("text")
    .attr("x", margin.left)
    .attr("y", margin.top - 12)
    .attr("font-size", 14)
    .attr("font-weight", "bold")
    .text("Department-to-department interaction overview");
}

function drawCanvasPoints() {
  const maxCount = d3.max(visibleData, d => d.count || 1);

  const hScale = d3.scaleSqrt()
    .domain([1, maxCount])
    .range([2, 8]);

  for (const d of visibleData) {
    const x = xScale(d.date);
    const y = yScale(d.pair);

    d._x = x;
    d._y = y;

    const segW = 2;
    const segH = hScale(d.count || 1);

    d._segW = segW;
    d._segH = segH;

    drawLineNodeGlyph(x, y, segW, segH, colorScale(d.action));

    if (d._highlightPerson) {
      drawSelectedPersonTailsOnSegment(x, y, segW, segH, d);
    }
  }
}

function drawLineNodeGlyph(x, y, w, h, color) {
  const radius = h / 2;

  ctx.save();
  ctx.globalAlpha = 0.78;
  ctx.fillStyle = color;

  roundRect(ctx, x - w / 2, y - h / 2, w, h, radius);

  ctx.fill();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);

  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

const FILE_EXT_RE = /\.(md|txt|csv|json|xlsx?|docx?|pdf|png|jpg|jpeg|log|yaml|yml|html|xml)$/i;

function collectStringsDeep(obj, result = []) {
  if (obj == null) return result;

  if (typeof obj === "string") {
    result.push(obj);
    return result;
  }

  if (Array.isArray(obj)) {
    obj.forEach(v => collectStringsDeep(v, result));
    return result;
  }

  if (typeof obj === "object") {
    Object.values(obj).forEach(v => collectStringsDeep(v, result));
  }

  return result;
}

function looksLikeFileName(s) {
  if (!s || typeof s !== "string") return false;

  const v = s.trim();

  // 排除明显的 person / agent / system id
  if (v.startsWith("person:")) return false;
  if (v.startsWith("Agent/person:")) return false;
  if (v.startsWith("system:")) return false;
  if (v.startsWith("world:")) return false;

  // path/to/file.ext 或 file.ext
  const lastPart = v.split("/").pop();

  return FILE_EXT_RE.test(lastPart);
}

function extractFileNames(e) {
  const files = [];

  FILE_FIELD_PATHS.forEach(path => {
    const values = getValuesByPath(e, path);

    values.forEach(value => {
      if (typeof value === "string" && looksLikeFileName(value)) {
        files.push(value.trim());
      }
    });
  });

  return Array.from(new Set(files));
}

function containsFileKeyword(obj, keyword) {

if (!obj) return false;

if (typeof obj === "string") {
  return obj.toLowerCase().includes(
    keyword.toLowerCase()
  );
}

if (Array.isArray(obj)) {
  return obj.some(v =>
    containsFileKeyword(v, keyword)
  );
}

if (typeof obj === "object") {
  return Object.values(obj).some(v =>
    containsFileKeyword(v, keyword)
  );
}

return false;
}

function isFileEvent(e, query) {
  if (!query) return false;

  const q = query.toLowerCase().trim();
  if (!q) return false;

  const files = extractFileNames(e);

  return files.some(file =>
    file.toLowerCase().includes(q)
  );
}

function getPeopleForFile(fileQuery, fileEvents) {
  const peopleMap = new Map();

  fileEvents.forEach(e => {
    if (e.sender_id) {
      peopleMap.set(
        (e.sender_id || "").replace(/^Agent\//, "").toLowerCase(),
        {
          id: e.sender_id,
          name: e.sender_name || e.sender_id,
          type: e.sender_type,
          department: e.sender_department
        }
      );
    }

    (e.receivers || []).forEach(r => {
      if (r.id) {
        peopleMap.set(
          (r.id || "").replace(/^Agent\//, "").toLowerCase(),
          {
            id: r.id,
            name: r.name || r.id,
            type: r.type,
            department: r.department
          }
        );
      }
    });
  });

  return Array.from(peopleMap.values());
}

function drawSelectedPersonTailsOnSegment(x, y, w, h, d) {
  if (d._isSenderTrace) {
    drawSenderTailOnSegment(x, y, w, h, deptColor(d.sender_department));
  }

  if (d._isReceiverTrace) {
    drawReceiverTailOnSegment(x, y, w, h, deptColor(d.receiver_department));
  }
}

function getTraceArrowColor(isSelectedTrace) {
  return isSelectedTrace ? "#c04fb3" : "#b8b8b8";
}

function isExpandedTraceNode(sender, day, x, y, rootWindow, eventDate) {
  if (!rootWindow || !eventDate) return false;

  const focusId = (sender.id || sender.name || "")
    .replace(/^Agent\//, "")
    .toLowerCase();

  const clickedTime = eventDate.toISOString();

  const key = [
    focusId,
    day,
    x.toFixed(1),
    y.toFixed(1),
    rootWindow.start.toISOString(),
    clickedTime
  ].join("||");

  return dailyGraphExpansions.some(exp => exp.key === key);
}

function drawSenderTailOnSegment(x, y, w, h, color) {
  const left = x - w / 2;
  const top = y - h / 2;
  const r = Math.max(h, 4);

  ctx.save();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.78;

  ctx.beginPath();
  ctx.moveTo(left, top);
  ctx.bezierCurveTo(left - r * 0.3, top - r * 0.6, left - r * 0.15, top - r * 1.4, left + r * 0.35, top - r * 2.0);
  ctx.bezierCurveTo(left + r * 0.65, top - r * 1.2, left + r * 0.55, top - r * 0.45, left + r * 0.15, top);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawReceiverTailOnSegment(x, y, w, h, color) {
  const right = x + w / 2;
  const bottom = y + h / 2;
  const r = Math.max(h, 4);

  ctx.save();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.78;

  ctx.beginPath();
  ctx.moveTo(right, bottom);
  ctx.bezierCurveTo(right + r * 0.35, bottom + r * 0.8, right + r * 0.25, bottom + r * 1.8, right - r * 0.25, bottom + r * 2.8);
  ctx.bezierCurveTo(right - r * 0.65, bottom + r * 1.8, right - r * 0.45, bottom + r * 0.65, right - r * 0.05, bottom);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function buildQuadtree() {
  quadtree = d3.quadtree()
    .x(d => d._x)
    .y(d => d._y)
    .addAll(visibleData);
}

canvas.addEventListener("mousemove", event => {
  if (currentTab !== "overview") return;
  if (!quadtree) return;

  const rect = canvas.getBoundingClientRect();
  const mx = event.clientX - rect.left;
  const my = event.clientY - rect.top;

  const d = quadtree.find(mx, my, 12);

  if (!d) {
    tooltip.style("display", "none");
    return;
  }

  tooltip
    .style("display", "block")
    .style("left", `${event.clientX + 16}px`)
    .style("top", `${event.clientY + 16}px`)
    .html(makeTooltip(d));
});

function makeTooltip(d) {
  const eventType = d.action || "unknown";
  const dateTime = d.first_time || d.time || d.time_bin || "";

  const sender =
    d.sender_name ||
    d.sender_id ||
    d.sender_department ||
    "Unknown sender";

  let receivers = "Unknown receiver";

  if (d.receiver_names && d.receiver_names.length) {
    receivers = d.receiver_names.join(", ");
  } else if (d.receivers && d.receivers.length) {
    receivers = d.receivers.map(r => r.name || r.id || r).join(", ");
  } else if (d.receiver_ids && d.receiver_ids.length) {
    receivers = d.receiver_ids.join(", ");
  } else if (d.receiver_department) {
    receivers = d.receiver_department;
  } else if (d.receiver_departments && d.receiver_departments.length) {
    receivers = d.receiver_departments.join(", ");
  }

  return `
    <b>Event type:</b> ${eventType}<br>
    <b>Sender:</b> ${sender}<br>
    <b>Receiver:</b> ${receivers}<br>
    <b>Date & time:</b> ${dateTime}<br>
    <b>Count:</b> ${d.count || 1}
  `;
}

/* ---------- Person matching ---------- */

function normalizeEntityId(id) {
  return (id || "")
    .replace(/^Agent\//, "")
    .toLowerCase();
}

function isPersonSender(e, q) {
  const target = normalizeEntityId(q);
  const senderId = normalizeEntityId(e.sender_id);
  const senderName = (e.sender_name || "").toLowerCase();

  return (
    senderId.includes(target) ||
    senderName.includes(target)
  );
}

function isPersonReceiver(e, q) {
  const target = normalizeEntityId(q);

  return (e.receivers || []).some(r => {
    const rid = normalizeEntityId(r.id);
    const rname = (r.name || "").toLowerCase();

    return (
      rid.includes(target) ||
      rname.includes(target)
    );
  });
}

/* ---------- Overview person trace ---------- */

function getPersonAnchorLevel1(d) {
  const w = d._segW || 2;
  const h = d._segH || 4;
  const r = Math.max(h, 4);

  if (d._isSenderTrace && !d._isReceiverTrace) {
    return {
      x: d._x - w / 2 + r * 0.35,
      y: d._y - h / 2 - r * 2.0
    };
  }

  if (d._isReceiverTrace && !d._isSenderTrace) {
    return {
      x: d._x + w / 2 - r * 0.25,
      y: d._y + h / 2 + r * 2.8
    };
  }

  return {
    x: d._x,
    y: d._y
  };
}

function makeLevel1Key(d) {
  return [
    d.time_bin,
    d.sender_department,
    d.receiver_department,
    d.action
  ].join("||");
}

function makeEventToLevel1Key(e, receiverDepartment) {
  return [
    e.time_bin,
    e.sender_department,
    receiverDepartment,
    e.action
  ].join("||");
}

function renderTrace() {
  currentTab = "overview";
  currentLevel = 1;
  currentData = level1Data;

  level1Data.forEach(d => {
    d._highlightPerson = false;
    d._isSenderTrace = false;
    d._isReceiverTrace = false;
  });

  render();

  const query = d3.select("#overviewPersonInput")
    .property("value")
    .trim()
    .toLowerCase();

  if (!query) return;

  const nodeByKey = new Map();

  visibleData.forEach(d => {
    nodeByKey.set(makeLevel1Key(d), d);
  });

  const matchedEvents = eventsData
    .filter(e => isPersonSender(e, query) || isPersonReceiver(e, query))
    .filter(eventPassesCurrentFilters)
    .sort((a, b) => a.date - b.date);

  const traceNodes = [];

  matchedEvents.forEach(e => {
    const senderMatch = isPersonSender(e, query);
    const receiverMatch = isPersonReceiver(e, query);

    const receiverDepartments =
      e.receiver_departments && e.receiver_departments.length
        ? e.receiver_departments
        : ["Unknown Receiver Department"];

    receiverDepartments.forEach(receiverDept => {
      const key = makeEventToLevel1Key(e, receiverDept);
      const node = nodeByKey.get(key);

      if (!node) return;

      node._highlightPerson = true;
      if (senderMatch) node._isSenderTrace = true;
      if (receiverMatch) node._isReceiverTrace = true;

      if (!traceNodes.includes(node)) {
        traceNodes.push(node);
      }
    });
  });

  traceNodes.sort((a, b) => a.date - b.date);

  ctx.clearRect(0, 0, width, height);
  drawCanvasPoints();

  svg.selectAll(".trace-layer").remove();

  const g = svg.append("g")
    .attr("class", "trace-layer");

  if (!traceNodes.length) return;

  const tracePoints = traceNodes.map(d => {
    const anchor = getPersonAnchorLevel1(d);
    return {
      ...d,
      anchorX: anchor.x,
      anchorY: anchor.y
    };
  });

  const line = d3.line()
    .x(d => d.anchorX)
    .y(d => d.anchorY)
    .curve(d3.curveMonotoneX);

  g.append("path")
    .datum(tracePoints)
    .attr("d", line)
    .attr("fill", "none")
    .attr("stroke", "#9aa0a6")
    .attr("stroke-width", 1.2)
    .attr("opacity", 0.45)
    .attr("stroke-linecap", "round")
    .attr("stroke-linejoin", "round");

  drawPersonEventTimeline(matchedEvents, query);
}

function makeEventTimelineTooltip(d, query) {
  const personName = getDisplayPersonNameFromEvent(d, query);

  const role = isPersonSender(d, query) && !isPersonReceiver(d, query)
    ? "sender"
    : isPersonReceiver(d, query) && !isPersonSender(d, query)
      ? "receiver"
      : "self / both";

  const sender =
    d.sender_name ||
    d.sender_id ||
    d.sender_department ||
    "Unknown sender";
  
  const files = extractFileNames(d);
  const fileHtml = files.length
  ? `<b>File:</b> ${files.join(", ")}<br>`
  : "";

  let receivers = "Unknown receiver";

  if (d.receivers && d.receivers.length) {
    receivers = d.receivers.map(r => r.name || r.id || r).join(", ");
  } else if (d.receiver_ids && d.receiver_ids.length) {
    receivers = d.receiver_ids.join(", ");
  } else if (d.receiver_departments && d.receiver_departments.length) {
    receivers = d.receiver_departments.join(", ");
  }

  return `
    <b>Person:</b> <b>${personName}</b><br>
    ${fileHtml}
    <b>Event type:</b> ${d.action || "unknown"}<br>
    <b>Date & time:</b> ${d.time || d.first_time || d.time_bin || ""}
  `;
}

function getDisplayPersonNameFromEvent(e, query) {
  const q = query.toLowerCase();

  if (
    (e.sender_id || "").toLowerCase().includes(q) ||
    (e.sender_name || "").toLowerCase().includes(q)
  ) {
    return e.sender_name || e.sender_id || query;
  }

  for (const r of (e.receivers || [])) {
    if (
      (r.id || "").toLowerCase().includes(q) ||
      (r.name || "").toLowerCase().includes(q)
    ) {
      return r.name || r.id || query;
    }
  }

  return query;
}

function drawPersonEventTimeline(events, query) {
  svg.selectAll(".person-event-timeline").remove();

  if (!events || !events.length) return;

  const g = svg.append("g")
    .attr("class", "person-event-timeline");

  const y = 62;
  const tickY = y + 18;

  g.append("text")
    .attr("x", margin.left)
    .attr("y", 22)
    .attr("font-size", 13)
    .attr("font-weight", "bold")
    .attr("fill", "#111")
    .text(`Person event timeline: ${query}`);

  g.append("line")
    .attr("x1", margin.left)
    .attr("x2", width - margin.right)
    .attr("y1", y)
    .attr("y2", y)
    .attr("stroke", "#777")
    .attr("stroke-width", 1)
    .attr("opacity", 0.5);

  g.selectAll("circle.event-dot")
    .data(events)
    .enter()
    .append("circle")
    .attr("class", "event-dot")
    .attr("cx", d => xScale(d.date))
    .attr("cy", d => {
      const sender = isPersonSender(d, query);
      const receiver = isPersonReceiver(d, query);

      if (sender && !receiver) return y - 12;
      if (receiver && !sender) return y + 12;
      return y;
    })
    .attr("r", 3.2)
    .attr("fill", d => colorScale(d.action))
    .attr("opacity", 0.9)
    .on("mousemove", function(event, d) {
      d3.select(this)
        .attr("r", 5)
        .attr("stroke", "#111")
        .attr("stroke-width", 1.2);

      tooltip
        .style("display", "block")
        .style("left", `${event.clientX + 16}px`)
        .style("top", `${event.clientY + 16}px`)
        .html(makeEventTimelineTooltip(d, query));
    })
    .on("mouseleave", function() {
      d3.select(this)
        .attr("r", 3.2)
        .attr("stroke", "none");

      tooltip.style("display", "none");
    });

  g.selectAll("line.event-stem")
    .data(events)
    .enter()
    .append("line")
    .attr("class", "event-stem")
    .attr("x1", d => xScale(d.date))
    .attr("x2", d => xScale(d.date))
    .attr("y1", y)
    .attr("y2", d => {
      const sender = isPersonSender(d, query);
      const receiver = isPersonReceiver(d, query);

      if (sender && !receiver) return y - 12;
      if (receiver && !sender) return y + 12;
      return y;
    })
    .attr("stroke", "#aaa")
    .attr("stroke-width", 0.6)
    .attr("opacity", 0.45);

  const grouped = d3.group(events, d => d.action);

  const actionSummary = Array.from(grouped, ([action, arr]) => ({
    action,
    count: arr.length
  }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 8);

  const legend = g.append("g")
    .attr("transform", `translate(${margin.left}, ${tickY + 22})`);

  const legendItems = legend.selectAll("g.legend-item")
    .data(actionSummary)
    .enter()
    .append("g")
    .attr("class", "legend-item")
    .attr("transform", (d, i) => {
      const col = i % 5;
      const row = Math.floor(i / 5);
      return `translate(${col * 170}, ${row * 16})`;
    });

  legendItems.append("circle")
    .attr("cx", 0)
    .attr("cy", -3)
    .attr("r", 4)
    .attr("fill", d => colorScale(d.action))
    .attr("opacity", 0.9);

  legendItems.append("text")
    .attr("x", 8)
    .attr("y", 0)
    .attr("font-size", 10)
    .attr("fill", "#111")
    .text(d => `${d.action} (${d.count})`);

  g.append("text")
    .attr("x", margin.left - 8)
    .attr("y", y - 12)
    .attr("text-anchor", "end")
    .attr("font-size", 10)
    .attr("fill", "#aaa")
    .text("sender");

  g.append("text")
    .attr("x", margin.left - 8)
    .attr("y", y + 15)
    .attr("text-anchor", "end")
    .attr("font-size", 10)
    .attr("fill", "#aaa")
    .text("receiver");
}

/* ---------- Daily graph filtering ---------- */

function getTraceWindow() {
  const dateValue = d3.select("#traceDateFilter").property("value");
  const hoursBack = Number(d3.select("#hoursBackFilter").property("value") || 6);

  if (!dateValue) return null;

  return {
    dateValue,
    hoursBack
  };
}

function buildAnchorWindowsForRoot(events, rootQuery, traceDate, hoursBack) {
  const q = rootQuery.toLowerCase();

  const dayStart = new Date(`${traceDate}T00:00:00`);
  const dayEnd = new Date(`${traceDate}T23:59:59`);

  const rootDayEvents = events
    .filter(e => {
      if (!e.date) return false;
      if (e.date < dayStart || e.date > dayEnd) return false;
      return isPersonSender(e, q) || isPersonReceiver(e, q);
    })
    .sort((a, b) => a.date - b.date);

  if (!rootDayEvents.length) return [];

  const rawStart = new Date(
    dayEnd.getTime() - hoursBack * 60 * 60 * 1000
  );

  const start = rawStart < dayStart ? dayStart : rawStart;

  return [{
    anchorEventId: "day-window",
    anchorDate: dayEnd,
    start,
    end: dayEnd
  }];
}

function buildClickedWindowForExpansion(clickedDate, parentWindow) {
  const clickedTime = clickedDate instanceof Date
    ? clickedDate
    : new Date(clickedDate);

  if (Number.isNaN(clickedTime.getTime())) {
    return parentWindow;
  }

  if (dailyGraphMode === "person") {
    const traceDate = d3.select("#traceDateFilter").property("value");
    const hoursBack =
      +d3.select("#hoursBackFilter").property("value") || 24;

    if (!traceDate) return parentWindow;

    const dayStart = new Date(`${traceDate}T00:00:00`);
    const dayEnd = new Date(`${traceDate}T23:59:59`);

    const rawStart = new Date(
      dayEnd.getTime() - hoursBack * 60 * 60 * 1000
    );

    const baseStart = rawStart < dayStart ? dayStart : rawStart;

    return {
      // 关键：outer 的 start 和 inner 一样
      start: baseStart,

      // 关键：outer 的 end 才是 clickedTime
      end: clickedTime
    };
  }

  if (dailyGraphMode === "file") {
    const fileWindow = getFileDateWindow();

    return {
      start: fileWindow.start || parentWindow.start,
      end: clickedTime
    };
  }

  return parentWindow;
}

function buildInnerWindowForExpansion(clickedDate, parentWindow) {
  if (dailyGraphMode === "person") {
    const traceDate = d3.select("#traceDateFilter").property("value");
    const hoursBack =
      +d3.select("#hoursBackFilter").property("value") || 24;

    if (!traceDate) return parentWindow;

    const dayStart = new Date(`${traceDate}T00:00:00`);
    const dayEnd = new Date(`${traceDate}T23:59:59`);

    const rawStart = new Date(
      dayEnd.getTime() - hoursBack * 60 * 60 * 1000
    );

    return {
      start: rawStart < dayStart ? dayStart : rawStart,
      end: dayEnd
    };
  }

  if (dailyGraphMode === "file") {
    const fileWindow = getFileDateWindow();

    return {
      start: fileWindow.start || parentWindow.start,
      end: fileWindow.end || parentWindow.end
    };
  }

  return parentWindow;
}

function toDateObj(d) {
  if (!d) return null;

  const t = d instanceof Date ? d : new Date(d);

  if (Number.isNaN(t.getTime())) return null;

  return t;
}

function eventInWindow(e, windowObj) {
  if (!e || !e.date || !windowObj) return false;

  const t = toDateObj(e.date);
  const start = toDateObj(windowObj.start);
  const end = toDateObj(windowObj.end);

  if (!t || !start || !end) return false;

  return t >= start && t <= end;
}

function eventInAnyAnchorWindow(e, windows) {
  return (windows || []).some(w => eventInWindow(e, w));
}

function getAnchorWindowForEvent(e) {
  if (!e || !e.date) return null;

  return (dailyGraphAnchorWindows || []).find(w =>
    eventInWindow(e, w)
  ) || null;
}

function getEventsForPersonWithinOneRootWindow(personQuery, windowObj, events) {
  const q = personQuery.toLowerCase();

  return events.filter(e => {
    if (!e || !e.date) return false;

    const isTargetPerson =
      isPersonSender(e, q) ||
      isPersonReceiver(e, q);

    if (!isTargetPerson) return false;

    if (dailyGraphMode === "person") {
      if (!windowObj) return false;
      return eventInWindow(e, windowObj);
    }

    if (dailyGraphMode === "file") {
      if (!windowObj) return false;
      return eventInWindow(e, windowObj);
    }

    return false;
  });
}

function getEventsForPersonWithinRootWindows(personQuery) {
  const q = personQuery.toLowerCase();

  return dailyGraphBaseEvents.filter(e => {
    if (!eventInAnyAnchorWindow(e, dailyGraphAnchorWindows)) return false;
    return isPersonSender(e, q) || isPersonReceiver(e, q);
  });
}

function drawExpandableDailyGraph(events, focusStack) {
  setupDailyGraphZoom();

  zoomLayer = svg.append("g")
  .attr("class", "daily-graph-zoom-layer");

const g = zoomLayer.append("g")
  .attr("class", "daily-graph-content");

  const eventsByDay = d3.group(events, d => d3.timeFormat("%m-%d")(d.date));
  const days = Array.from(eventsByDay.keys()).sort();

  if (!days.length) {
    g.append("text")
      .attr("x", margin.left)
      .attr("y", 50)
      .attr("font-size", 14)
      .attr("fill", "#111")
      .text("No events match the selected filters.");
    return g;
  }

  const innerRadius = DAILY_INNER_RADIUS;
  const outerRadius = DAILY_OUTER_RADIUS;

  const graphDiameter = outerRadius * 2;

  // 控制同一天 column 之间的距离
  const colGap = graphDiameter + 160;

  // 控制同一天内不同 person 之间的距离
  const rowGap = graphDiameter + 120;

  const startX = margin.left + outerRadius + 80;
  const startY = 160 + outerRadius;

  g.append("text")
    .attr("x", margin.left)
    .attr("y", 32)
    .attr("font-size", 15)
    .attr("font-weight", "bold")
    .attr("fill", "#111")
    .text("Root-window upstream trace graph");

  g.append("text")
    .attr("x", margin.left)
    .attr("y", 54)
    .attr("font-size", 11)
    .attr("fill", "#555")
    .text(
      dailyGraphMode === "file"
        ? "File-related people are shown with expandable upstream interactions."
        : "All layers are filtered by the root person's activity-time windows."
    );

  days.forEach((day, dayIndex) => {
    const cx = startX + dayIndex * colGap;

    g.append("text")
      .attr("x", cx)
      .attr("y", startY - outerRadius - 35)
      .attr("text-anchor", "middle")
      .attr("font-size", 12)
      .attr("font-weight", "bold")
      .attr("fill", "#111")
      .text(day);

    focusStack.forEach((rootQuery, personIndex) => {
      const cy = startY + personIndex * rowGap;
      const dayEvents = eventsByDay.get(day).sort((a, b) => a.date - b.date);

      drawRootDailyLayer(
        g,
        dayEvents,
        rootQuery,
        day,
        cx,
        cy,
        innerRadius,
        outerRadius
      );
    });
  });

  for (let i = 0; i < dailyGraphExpansions.length; i++) {
  drawNodeExpansion(g, dailyGraphExpansions[i]);
}
  
  g.selectAll(".daily-node, .daily-upstream-node").raise();

  const contentW =
    startX + days.length * colGap + margin.right + 200;

  const contentH =
    startY + focusStack.length * rowGap + margin.bottom + 220;

  setDailyGraphCanvasSize(contentW, contentH);

  if (keepDailyGraphZoom && savedDailyGraphViewCenter) {
  restoreViewCenterInGraphCoords(savedDailyGraphViewCenter);
  keepDailyGraphZoom = false;
  savedDailyGraphViewCenter = null;
} else {
  fitDailyGraphToView(zoomLayer);
}

  return g;
}

function setDailyGraphCanvasSize(contentW, contentH) {
  const container = document.getElementById("container");

  width = Math.max(container.clientWidth, contentW);
  height = Math.max(container.clientHeight, contentH);

  setupCanvasSvg(height);

  svg
    .attr("width", width)
    .attr("height", height);

  canvas.style.width = width + "px";
  canvas.style.height = height + "px";
  svg.style.width = width + "px";
  svg.style.height = height + "px";
}

function fitDailyGraphToView(g) {
  if (keepDailyGraphZoom && savedDailyGraphViewCenter) {
    restoreViewCenterInGraphCoords(savedDailyGraphViewCenter);
    keepDailyGraphZoom = false;
    savedDailyGraphViewCenter = null;
    return;
  }

  if (!g || !svgZoom || !svg) return;

  const node = g.node();
  if (!node) return;

  const bbox = node.getBBox();

  if (!bbox.width || !bbox.height) return;

  const container = document.getElementById("container");

  const padding = 80;

  const scale = Math.min(
    (container.clientWidth - padding * 2) / bbox.width,
    (container.clientHeight - padding * 2) / bbox.height,
    1.2
  );

  const x = container.clientWidth / 2 - scale * (bbox.x + bbox.width / 2);
  const y = container.clientHeight / 2 - scale * (bbox.y + bbox.height / 2);

  const t = d3.zoomIdentity
    .translate(x, y)
    .scale(scale);

  dailyGraphZoomTransform = t;

  svg.call(svgZoom.transform, t);
}

function autoFitDailyGraph(g) {
  const node = g.node();
  if (!node) return;

  let box;

  try {
    box = node.getBBox();
  } catch (err) {
    return;
  }

  const viewportW = document.getElementById("container").clientWidth;
  const viewportH = document.getElementById("container").clientHeight;

  let offsetX = 0;
  let offsetY = 0;

  const safeLeft = DAILY_LAYOUT_PADDING;
  const safeTop = DAILY_TITLE_SAFE_TOP + DAILY_LAYOUT_PADDING;

  if (box.x < safeLeft) {
    offsetX = safeLeft - box.x;
  }

  if (box.y < safeTop) {
    offsetY = safeTop - box.y;
  }

  const contentW = box.x + offsetX + box.width + DAILY_LAYOUT_PADDING;
  const contentH = box.y + offsetY + box.height + DAILY_LAYOUT_PADDING;

  const newWidth = Math.max(viewportW, contentW);
  const newHeight = Math.max(viewportH, contentH);

  width = newWidth;
  height = newHeight;

  setupCanvasSvg(height);
  svg.attr("width", width).attr("height", height);

  ctx.clearRect(0, 0, width, height);

  g.attr("transform", `translate(${offsetX}, ${offsetY})`);

  canvas.style.width = width + "px";
  svg.style.width = width + "px";
}

  };

function getPersonDepartmentFromEvent(e, query) {
  const q = query.toLowerCase();

  if (
    (e.sender_id || "").toLowerCase().includes(q) ||
    (e.sender_name || "").toLowerCase().includes(q)
  ) {
    return e.sender_department || "Unknown Department";
  }

  for (const r of (e.receivers || [])) {
    if (
      (r.id || "").toLowerCase().includes(q) ||
      (r.name || "").toLowerCase().includes(q)
    ) {
      return r.department || "Unknown Department";
    }
  }

  return "Unknown Department";
}

function getExternalSendersForFocus(e, focusQuery) {
  const q = normalizeEntityId(focusQuery);

  const focusIsReceiver = (e.receivers || []).some(r =>
    normalizeEntityId(r.id).includes(q) ||
    (r.name || "").toLowerCase().includes(q)
  );

  const senderIsFocus =
    normalizeEntityId(e.sender_id).includes(q) ||
    (e.sender_name || "").toLowerCase().includes(q);

  // 只画“发给当前 focus 的外部 sender”
  if (focusIsReceiver && !senderIsFocus) {
    return [{
      id: e.sender_id,
      name: e.sender_name,
      type: e.sender_type,
      department: e.sender_department
    }];
  }

  return [];
}

function hourToAngle(hour) {
  return -Math.PI / 2 + (hour / 24) * Math.PI * 2;
}

function dateToDayAngle(date) {
  const hour = date.getHours();
  const minute = date.getMinutes();
  const second = date.getSeconds();

  const t = hour + minute / 60 + second / 3600;

  return hourToAngle(t);
}

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function normalizeAngle(a) {
  const twoPi = Math.PI * 2;
  return ((a % twoPi) + twoPi) % twoPi;
}

function makeArcPath(cx, cy, r, startAngle, endAngle) {
  const twoPi = Math.PI * 2;

  let start = normalizeAngle(startAngle);
  let end = normalizeAngle(endAngle);

  if (end < start) end += twoPi;

  const largeArc = end - start > Math.PI ? 1 : 0;

  const p1 = polar(cx, cy, r, start);
  const p2 = polar(cx, cy, r, end);

  return `
    M ${p1.x} ${p1.y}
    A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y}
  `;
}

function getActivityArcAngles(events) {
  const pad = 0.14; // 单点时的小弧长度，可调大/小

  if (!events || !events.length) return null;

  const angles = events
    .map(e => normalizeAngle(dateToDayAngle(e.date)))
    .sort((a, b) => a - b);

  if (angles.length === 1) {
    return {
      start: angles[0] - pad,
      end: angles[0] + pad
    };
  }

  // 找最大空档，然后画它的反面：也就是覆盖所有节点的连续弧
  let maxGap = -1;
  let gapStartIndex = 0;

  for (let i = 0; i < angles.length; i++) {
    const a1 = angles[i];
    const a2 = angles[(i + 1) % angles.length] + (i === angles.length - 1 ? Math.PI * 2 : 0);
    const gap = a2 - a1;

    if (gap > maxGap) {
      maxGap = gap;
      gapStartIndex = i;
    }
  }

  const start = angles[(gapStartIndex + 1) % angles.length];
  let end = angles[gapStartIndex];

  if (end < start) end += Math.PI * 2;

  return { start, end };
}

function drawActivityArc(g, cx, cy, r, events, color = "#eeeeee") {
  const arc = getActivityArcAngles(events);
  if (!arc) return;

  g.append("path")
    .attr("d", makeArcPath(cx, cy, r, arc.start, arc.end))
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 1.4)
    .attr("stroke-linecap", "round")
    .attr("opacity", 0.9);
}

function drawOuterActivityArc(g, cx, cy, r, outerEvents, color = "#eeeeee") {
  const arc = getActivityArcAngles(outerEvents);
  if (!arc) return;

  const OUTER_ARC_PADDING = Math.PI / 8; // 22.5度，想更大就改成 Math.PI / 6

  g.append("path")
    .attr(
      "d",
      makeArcPath(
        cx,
        cy,
        r,
        arc.start - OUTER_ARC_PADDING,
        arc.end + OUTER_ARC_PADDING
      )
    )
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 1.1)
    .attr("stroke-linecap", "round")
    .attr("opacity", 0.75)
    .attr("pointer-events", "none");
}

function centerFromPointOnCircle(px, py, r, angle) {
  return {
    x: px - r * Math.cos(angle),
    y: py - r * Math.sin(angle)
  };
}

function showTimeLabel(g, cx, cy, radius, angle, e) {
  g.selectAll(".hover-time-label").remove();

  const p = polar(cx, cy, radius + 18, angle);
  const timeText = d3.timeFormat("%H:%M")(e.date);

  g.append("text")

    .attr("y", p.y)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", 10)
    .attr("font-weight", "bold")
    .attr("fill", "#111")
    .attr("pointer-events", "none")
    .text(timeText);
}

function hideTimeLabel(g) {
  g.selectAll(".hover-time-label").remove();
}

function drawPersonDisk(g, cx, cy, radius, focusQuery, events) {

}

function getPersonDepartmentFromEvents(events, focusQuery) {
  for (const e of events) {
    const dept = getPersonDepartmentFromEvent(e, focusQuery);
    if (dept && dept !== "Unknown Department") return dept;
  }
  return "Unknown Department";
}

function drawTinyArrow(g, x1, y1, x2, y2, color, opacity = 0.75, width = 1, arrowSize = 4) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);

  if (len === 0) return;

  const ux = dx / len;
  const uy = dy / len;

  const endX = x2 - ux * 4;
  const endY = y2 - uy * 4;

  g.append("line")
    .attr("x1", x1)
    .attr("y1", y1)
    .attr("x2", endX)
    .attr("y2", endY)
    .attr("stroke", color)
    .attr("stroke-width", width)
    .attr("opacity", opacity)
    .attr("pointer-events", "none"); 

  const leftX = endX - ux * arrowSize - uy * arrowSize * 0.6;
  const leftY = endY - uy * arrowSize + ux * arrowSize * 0.6;
  const rightX = endX - ux * arrowSize + uy * arrowSize * 0.6;
  const rightY = endY - uy * arrowSize - ux * arrowSize * 0.6;

  g.append("path")
    .attr("d", `M ${endX} ${endY} L ${leftX} ${leftY} L ${rightX} ${rightY} Z`)
    .attr("fill", color)
    .attr("opacity", opacity)
    .attr("pointer-events", "none");
}
