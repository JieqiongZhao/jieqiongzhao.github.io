function getValuesByPath(obj, path) {
  const parts = path.split(".");

  function step(current, idx) {
    if (current == null) return [];

    if (idx >= parts.length) {
      return [current];
    }

    const part = parts[idx];

    if (part.endsWith("[]")) {
      const key = part.slice(0, -2);
      const arr = current[key];

      if (!Array.isArray(arr)) return [];

      return arr.flatMap(item =>
        step(item, idx + 1)
      );
    }

    return step(current[part], idx + 1);
  }

  return step(obj, 0);
}


function getDailyGraphDayKey(e) {
  if (!e || !e.date) return "";
  return d3.timeFormat("%m-%d")(e.date);
}

function normalizeTracePersonId(id) {
  return (id || "")
    .replace(/^Agent\//, "")
    .toLowerCase()
    .trim();
}

function setPersonGraphHover(personId) {
  const pid = normalizeTracePersonId(personId);
  if (!pid) return;

  hoveredPersonId = pid;

  svg.selectAll(".person-graph")
    .classed("person-graph-dim", function() {
      return d3.select(this).attr("data-person") !== pid;
    })
    .classed("person-graph-highlight", function() {
      return d3.select(this).attr("data-person") === pid;
    });

  svg.selectAll(".person-graph")
    .filter(function() {
      return d3.select(this).attr("data-person") === pid;
    })
    .raise();
}

function clearPersonGraphHover() {
  hoveredPersonId = null;

  d3.selectAll(".person-graph")
    .classed("person-graph-dim", false)
    .classed("person-graph-highlight", false);
}

function applyGraphIsolation() {
  d3.selectAll(".person-graph")
    .classed("person-graph-hidden", function() {
      if (!dailyGraphVisibleGraphKeysWhenIsolated) return false;

      const graphKey = d3.select(this).attr("data-graph-key");
      return !dailyGraphVisibleGraphKeysWhenIsolated.has(graphKey);
    });
}

function toggleGraphIsolation(graphKey) {
  if (!graphKey) return;

  // 再点同一个 disk：恢复完整 chain
  if (dailyGraphIsolationAnchorKey === graphKey) {
    dailyGraphIsolationAnchorKey = null;
    dailyGraphVisibleGraphKeysWhenIsolated = null;
  } else {
    // 第一次点 disk：只显示这个 graph
    dailyGraphIsolationAnchorKey = graphKey;
    dailyGraphVisibleGraphKeysWhenIsolated = new Set([graphKey]);
  }

  keepDailyGraphZoom = true;

  if (typeof getCurrentViewCenterInGraphCoords === "function") {
    savedDailyGraphViewCenter = getCurrentViewCenterInGraphCoords();
  }

  renderDailyGraphTab();
}

function addDiskInteractionOverlay(g, cx, cy, innerRadius, personId, graphKey) {
  g.append("circle")
    .attr("class", "disk-click-overlay")
    .attr("cx", cx)
    .attr("cy", cy)
    .attr("r", Math.max(innerRadius - 8, 10))
    .attr("pointer-events", "all")
    .on("mousemove", function(event) {
      event.stopPropagation();
      setPersonGraphHover(personId);
    })
    .on("mouseleave", function() {
      clearPersonGraphHover();
    })
    .on("click", function(event) {
      event.stopPropagation();
      toggleGraphIsolation(graphKey);
    });
}

function getEventTimeMs(e) {
  if (!e || !e.date) return NaN;

  const t = e.date instanceof Date
    ? e.date
    : new Date(e.date);

  return t.getTime();
}

function getPeopleIdsFromEvent(e) {
  const ids = new Set();

  function addId(v) {
    const id = normalizeTracePersonId(v);
    if (id && id.startsWith("person:")) {
      ids.add(id);
    }
  }

  addId(e.sender_id);

  (e.receivers || []).forEach(r => {
    addId(r.id);
  });

  (e.receiver_ids || []).forEach(id => {
    addId(id);
  });

  (e.parties || []).forEach(p => {
    addId(p);
  });

  const d = e.details || {};
  [
    d.person,
    d.from,
    d.to,
    d.target_agent,
    d.agent,
    d.sender,
    d.receiver
  ].forEach(addId);

  return Array.from(ids);
}

function eventHasPersonId(e, personId) {
  const q = normalizeTracePersonId(personId);
  if (!q) return false;

  return getPeopleIdsFromEvent(e).includes(q);
}

function getExternalSenderIdsForFocus(e, focusPersonId) {
  return getExternalSendersForFocus(e, focusPersonId)
    .map(s => normalizeTracePersonId(s.id || s.name))
    .filter(Boolean);
}

const EDGE_RELATION_TYPES = new Set([
  "direct_transfer",
  "agent_to_agent",
  "task_delegation",
  "task_delegation_inferred_from_parties",
  "meeting_proposal",
  "calendar_email",
  "email_message",
  "email_reply",
  "person_to_person",
  "interaction_inferred_from_parties",
  "interaction_from_parties_fallback"
]);

function isChainEligibleInteraction(e) {
  return EDGE_RELATION_TYPES.has(e.relation_type);
}

function buildFileOccurrenceRecords(fileEvents) {
  const startRecords = [];
  const edgeRecords = [];

  fileEvents.forEach(e => {
    const day = getDailyGraphDayKey(e);
    const timeMs = getEventTimeMs(e);

    if (!day || Number.isNaN(timeMs)) return;

    const people = getPeopleIdsFromEvent(e);

    people.forEach(focusId => {
      // 这个 person 自己的 inner circle 上有 file-related event
      startRecords.push({
        day,
        focusId,
        event: e,
        eventId: e.id,
        timeMs,
        role: "inner",
        key: ["start", day, focusId, e.id, "inner"].join("||")
      });

      if (!isChainEligibleInteraction(e)) {
        return;
      }

      const upstreamIds = getExternalSenderIdsForFocus(e, focusId);

      upstreamIds.forEach(upstreamId => {
        // 这个 focus graph 的 outer circle 上有 file-related upstream node
        edgeRecords.push({
          day,
          focusId,
          upstreamId,
          event: e,
          eventId: e.id,
          timeMs,
          key: ["edge", day, upstreamId, focusId, e.id].join("||")
        });

        startRecords.push({
          day,
          focusId,
          upstreamId,
          event: e,
          eventId: e.id,
          timeMs,
          role: "outer",
          key: ["start", day, focusId, upstreamId, e.id, "outer"].join("||")
        });
      });
    });
  });

  return {
    startRecords,
    edgeRecords
  };
}

function findNearestFileUpstreamEdge({
  personId,
  currentTimeMs,
  day,
  edgeRecords,
  usedEdgeKeysInChain
}) {
  const q = normalizeTracePersonId(personId);
  if (!q || Number.isNaN(currentTimeMs)) return null;

  const candidates = edgeRecords
    .filter(edge => {
      if (edge.day !== day) return false;

      // 当前 person 必须是 receiver / focus
      if (edge.focusId !== q) return false;

      // 同一条 chain 里不能重复同一条 edge
      if (usedEdgeKeysInChain.has(makeOuterInnerHighlightKey(edge))) return false;

      // 必须发生在当前 event 之前
      // 这里用 <，因为你说的是“发生在他之前”
      if (edge.timeMs > currentTimeMs) return false;

      return true;
    })
    .map(edge => ({
      edge,
      timeDiff: currentTimeMs - edge.timeMs
    }))
    .sort((a, b) => {
      if (a.timeDiff !== b.timeDiff) {
        return a.timeDiff - b.timeDiff;
      }

      // 同样接近时，选更晚的
      return b.edge.timeMs - a.edge.timeMs;
    });

    if (!candidates.length) {
  const allForPerson = edgeRecords
    .filter(edge =>
      edge.day === day &&
      edge.focusId === q
    )
    .map(edge => ({
      from: edge.upstreamId,
      to: edge.focusId,
      time: new Date(edge.timeMs).toISOString(),
      currentTime: new Date(currentTimeMs).toISOString(),
      diffMs: currentTimeMs - edge.timeMs,
      action: edge.event?.action,
      eventId: edge.eventId,
      highlightKey: makeOuterInnerHighlightKey(edge)
    }))
    .sort((a, b) => new Date(b.time) - new Date(a.time));
}

  return candidates.length ? candidates[0] : null;
}

function expandFileUpstreamFromEvent({
  rootPersonId,
  startEvent,
  day,
  edgeRecords,
  chainEdges,
  maxDepth = 12
}) {
  const rootId = normalizeTracePersonId(rootPersonId);
  if (!rootId || !startEvent) return;

  const startTimeMs = getEventTimeMs(startEvent);
  if (Number.isNaN(startTimeMs)) return;

  const usedEdgeKeysInChain = new Set();

  let currentPersonId = rootId;
  let currentTimeMs = startTimeMs;
  let depth = 0;

  while (depth < maxDepth) {
    const found = findNearestFileUpstreamEdge({
      personId: currentPersonId,
      currentTimeMs,
      day,
      edgeRecords,
      usedEdgeKeysInChain
    });

    if (!found) break;

    const { edge, timeDiff } = found;

    usedEdgeKeysInChain.add(makeOuterInnerHighlightKey(edge));

    chainEdges.push({
      day,
      from: edge.upstreamId,
      to: edge.focusId,
      event: edge.event,
      eventId: edge.eventId,
      eventTimeMs: edge.timeMs,
      timeDiff,
      depth: depth + 1,
      key: edge.key
    });

    // 下一步：继续找 upstream person 在更早时间收到 file 的 outer node
    currentPersonId = edge.upstreamId;
    currentTimeMs = edge.timeMs;

    depth += 1;
  }
}

function makeFileChainEdgeSignature(edge) {
  return [
    normalizeTracePersonId(edge.from),
    normalizeTracePersonId(edge.to),
    edge.eventTimeMs,
    edge.event?.action || edge.event?.short_name || "",
    edge.eventId
  ].join("||");
}

function makeFileChainNodeSignatureFromEdge(edge) {
  // 表示这个 edge 的 receiver/focus 这个 node：
  // person + time + action
  return [
    normalizeTracePersonId(edge.to),
    edge.eventTimeMs,
    edge.event?.action || edge.event?.short_name || ""
  ].join("||");
}

function makeFileChainStartSignature(chainEdges) {
  if (!chainEdges || !chainEdges.length) return "";
  return makeFileChainNodeSignatureFromEdge(chainEdges[0]);
}

function makeFileChainSequenceKey(chainEdges) {
  return chainEdges
    .map(makeFileChainEdgeSignature)
    .join("##");
}

function isSequenceContainedInPreviousChains(chainEdges, previousChainSequences) {
  const seq = makeFileChainSequenceKey(chainEdges);
  if (!seq) return false;

  return previousChainSequences.some(prevSeq =>
    prevSeq.includes(seq)
  );
}

function isChainCoveredByUsedSubchains(chainEdges, usedSubchainKeys) {
  if (!chainEdges || !chainEdges.length) return false;

  const edgeKeys = chainEdges.map(makeFileChainEdgeSignature);

  // 如果这条新 chain 的每条 edge 都已经在前面的 chain 中出现过，
  // 说明它是已有 chain 的子链或重复链。
  return edgeKeys.every(k => usedSubchainKeys.has(k));
}

function getFileEdgeAction(edge) {
  return (
    edge?.event?.action ||
    edge?.event?.short_name ||
    edge?.action ||
    "unknown"
  );
}

function normalizeTimeToSecond(ms) {
  return Math.floor(Number(ms) / 1000);
}

function makeOuterInnerHighlightKey(edge) {
  return [
    normalizeTracePersonId(edge.from), // outer node person
    normalizeTracePersonId(edge.to),   // inner node person
    normalizeTimeToSecond(edge.eventTimeMs),
    getFileEdgeAction(edge),
    edge.eventId || ""
  ].join("||");
}

function chainHasUsedOuterInnerEdge(chainEdges, usedHighlightedOuterInnerEdges) {
  return (chainEdges || []).some(edge =>
    usedHighlightedOuterInnerEdges.has(
      makeOuterInnerHighlightKey(edge)
    )
  );
}

function getOuterInnerDebugRows(chainEdges) {
  return (chainEdges || []).map(edge => ({
    fromOuter: edge.from,
    toInner: edge.to,
    time: new Date(edge.eventTimeMs).toISOString(),
    action: getFileEdgeAction(edge),
    eventId: edge.eventId,
    highlightKey: makeOuterInnerHighlightKey(edge)
  }));
}

function buildFileTemporalChainsByDay(fileEvents) {
  const {
    edgeRecords
  } = buildFileOccurrenceRecords(fileEvents);

  const edgeByDay = d3.group(edgeRecords, d => d.day);

  const fileEventsByDay = d3.group(
    fileEvents.slice().sort((a, b) => a.date - b.date),
    e => getDailyGraphDayKey(e)
  );

  const previousChainSequences = [];
  const chainsByDay = new Map();

  fileEventsByDay.forEach((dayFileEvents, day) => {
    if (!day) return;

    const dayEdges = edgeByDay.get(day) || [];

    if (!dayEdges.length) {
      chainsByDay.set(day, []);
      return;
    }

    // 每个人当天最后一次作为 receiver / focus 的 file edge
    const latestEdgeByRootPerson = new Map();

    dayEdges.forEach(edge => {
      const rootPersonId = normalizeTracePersonId(edge.focusId);
      if (!rootPersonId) return;

      const old = latestEdgeByRootPerson.get(rootPersonId);

      if (!old || edge.timeMs > old.timeMs) {
        latestEdgeByRootPerson.set(rootPersonId, edge);
      }
    });

    // root candidates：按当天最后一次 file receiving edge，从晚到早
    const rootCandidates = Array.from(
      latestEdgeByRootPerson.entries(),
      ([personId, edge]) => ({
        personId,
        latestEdge: edge,
        latestTime: edge.timeMs
      })
    )
      .sort((a, b) => b.latestTime - a.latestTime);

    const usedRootPeople = new Set();
    const usedHighlightedOuterInnerEdges = new Set();
    const chains = [];

    rootCandidates.forEach(candidate => {
      const rootPersonId = candidate.personId;

      // 只排除已经作为 root 开过 chain 的人
      if (usedRootPeople.has(rootPersonId)) return;

      const rootEdge = candidate.latestEdge;

      const chainEdges = [];

      // root 自己的 latest outer edge 先放进去
      chainEdges.push({
        day,
        from: rootEdge.upstreamId,
        to: rootEdge.focusId,
        event: rootEdge.event,
        eventId: rootEdge.eventId,
        eventTimeMs: rootEdge.timeMs,
        timeDiff: 0,
        depth: 0,
        key: rootEdge.key,
        isRootEdge: true
      });

      // 然后从 root 的 upstream person 继续往前找
      expandFileUpstreamFromEvent({
        rootPersonId: rootEdge.upstreamId,
        startEvent: rootEdge.event,
        day,
        edgeRecords: dayEdges,
        chainEdges,
        maxDepth: 200
      });

      const people = new Set();

      chainEdges.forEach(edge => {
        people.add(normalizeTracePersonId(edge.from));
        people.add(normalizeTracePersonId(edge.to));
      });
      const hasUsedOuterInnerEdge =
  chainHasUsedOuterInnerEdge(
    chainEdges,
    usedHighlightedOuterInnerEdges
  );

if (hasUsedOuterInnerEdge) {
  return;
}
      chains.push({
        day,
        rootPersonId,
        rootTimeMs: rootEdge.timeMs,
        rootEventId: rootEdge.eventId,
        starts: [rootEdge],
        edges: chainEdges,
        people
      });

      chainEdges.forEach(edge => {
  usedHighlightedOuterInnerEdges.add(
    makeOuterInnerHighlightKey(edge)
  );
});

previousChainSequences.push(
  makeFileChainSequenceKey(chainEdges)
);
      // 关键：只排除 root person
      // 不要排除 chain 上所有 person
      usedRootPeople.add(rootPersonId);
    });

    chainsByDay.set(day, chains);
  });

  return chainsByDay;
}

function maybeAutoAddTemporalFileExpansion({
  sender,
  e,
  focusQuery,
  x,
  y,
  angle,
  depth,
  rootWindow,
  graphInstanceKey
}) {
  return;
  if (!sender || !e || !e.date || !rootWindow) return;

  const day = getDailyGraphDayKey(e);

  const senderId = normalizeTracePersonId(
    sender.id || sender.name
  );

  const focusId = normalizeTracePersonId(focusQuery);

  if (!day || !senderId || !focusId) return;

  // 关键：只自动展开 temporal chain planner 里已经决定要画的 edge
  const edgeKey = makeConcreteEdgeKey(
  day,
  senderId,
  focusId,
  e.id
);

const expectedEdge = getExpectedFileEdgeForGraph(graphInstanceKey);

if (!expectedEdge || expectedEdge.key !== edgeKey) {
  return;
}

  const autoKey = [
    "auto-temporal-file",
    day,
    senderId,
    focusId,
    e.id
  ].join("||");

  if (dailyGraphFileAutoExpandedKeys.has(autoKey)) {
    return;
  }

  dailyGraphFileAutoExpandedKeys.add(autoKey);

  const outerWindow = buildClickedWindowForExpansion(
    e.date,
    rootWindow
  );

  const innerWindow = buildInnerWindowForExpansion(
    e.date,
    rootWindow
  );

  if (
    !outerWindow ||
    !outerWindow.start ||
    !outerWindow.end ||
    !innerWindow ||
    !innerWindow.start ||
    !innerWindow.end
  ) {
    console.warn("AUTO EXPANSION SKIP: invalid window", {
      day,
      senderId,
      focusId,
      eventId: e.id,
      outerWindow,
      innerWindow,
      rootWindow
    });
    return;
  }

  const clickedTime = e.date instanceof Date
    ? e.date.toISOString()
    : new Date(e.date).toISOString();

  const expKey = [
    senderId,
    day,
    x.toFixed(1),
    y.toFixed(1),
    rootWindow.start.toISOString(),
    clickedTime
  ].join("||");

  const alreadyExists = dailyGraphExpansions.some(exp =>
    exp.key === expKey
  );

  if (alreadyExists) {
    return;
  }

  dailyGraphExpansions.push({
    key: expKey,
    autoFileChain: true,

    graphInstanceKey: expectedEdge.childGraphKey,
    chainId: expectedEdge.chainId,
    chainEdgeIndex: expectedEdge.chainEdgeIndex,
    parentGraphKey: expectedEdge.parentGraphKey,
    edgeKey: expectedEdge.key,

    personId: senderId,
    personName: sender.name || sender.id || senderId,
    day,

    clickedX: x,
    clickedY: y,
    clickedAngle: angle,
    depth: depth + 1,
    clickedTime,

    // outer circle 用的 window
    windowStart: outerWindow.start.toISOString(),
    windowEnd: outerWindow.end.toISOString(),

    // inner circle 用的 window
    innerWindowStart: innerWindow.start.toISOString(),
    innerWindowEnd: innerWindow.end.toISOString(),

    // debug 信息
    parentFocus: focusId,
    eventId: e.id
  });

  console.log("AUTO TEMPORAL FILE EXPANSION ADDED", {
    day,
    from: senderId,
    to: focusId,
    eventId: e.id,
    eventTime: e.date,
    expKey
  });
}

function normalizeTracePersonId(id) {
  return (id || "")
    .replace(/^Agent\//, "")
    .toLowerCase()
    .trim();
}

function getPeopleIdsFromEvent(e) {
  const ids = [];

  if (e.sender_id) {
    const senderId = normalizeTracePersonId(e.sender_id);
    if (senderId) ids.push(senderId);
  }

  (e.receivers || []).forEach(r => {
    const rid = normalizeTracePersonId(r.id);
    if (rid) ids.push(rid);
  });

  return Array.from(new Set(ids));
}

function buildFileFocusByDay(fileEvents) {
  const map = new Map();

  const fileEventsByDay = d3.group(
    fileEvents,
    e => getDailyGraphDayKey(e)
  );

  fileEventsByDay.forEach((eventsOfDay, day) => {
    if (!day) return;

    const people = getPeopleForFile(
      dailyGraphFileQuery,
      eventsOfDay
    );

    const peopleSet = new Set();

    people.forEach(p => {
      const id = (p.id || "")
        .replace(/^Agent\//, "")
        .toLowerCase()
        .trim();

      if (id) {
        peopleSet.add(id);
      }
    });

    map.set(day, peopleSet);
  });

  return map;
}

function eventTouchesFileFocusPeopleOnSameDay(e) {
  const day = getDailyGraphDayKey(e);
  if (!day) return false;

  const peopleSet = dailyGraphFileFocusByDay.get(day);

  if (!peopleSet || !peopleSet.size) {
    return false;
  }

  return Array.from(peopleSet).some(personId =>
    isPersonSender(e, personId) ||
    isPersonReceiver(e, personId)
  );
}

  dailyGraphFileFocusByDay.forEach(peopleSet => {

function getCurrentViewCenterInGraphCoords() {
  const container = document.getElementById("container");

  const screenCenterX = container.clientWidth / 2;
  const screenCenterY = container.clientHeight / 2;

  const t = dailyGraphZoomTransform || d3.zoomIdentity;

  return {
    x: (screenCenterX - t.x) / t.k,
    y: (screenCenterY - t.y) / t.k,
    k: t.k
  };
}

function restoreViewCenterInGraphCoords(center) {
  if (!center || !svgZoom || !svg) return;

  const container = document.getElementById("container");

  const screenCenterX = container.clientWidth / 2;
  const screenCenterY = container.clientHeight / 2;

  const k = center.k || dailyGraphZoomTransform.k || 1;

  const t = d3.zoomIdentity
    .translate(
      screenCenterX - center.x * k,
      screenCenterY - center.y * k
    )
    .scale(k);

  dailyGraphZoomTransform = t;

  svg.call(svgZoom.transform, t);
}

const deptOrder = Object.keys(departmentColor);

function sortByDeptColorOrder(values) {
  return values.slice().sort((a, b) => {
    const ia = deptOrder.indexOf(a);
    const ib = deptOrder.indexOf(b);

    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;

    return String(a).localeCompare(String(b));
  });
}

const actionOrder = Object.keys(actionColorMap);

function sortByActionColorOrder(values) {
  return values.slice().sort((a, b) => {
    const ia = actionOrder.indexOf(a);
    const ib = actionOrder.indexOf(b);

    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;

    return String(a).localeCompare(String(b));
  });
}

  if (currentTab === "dailyGraph") {
    renderDailyGraphTab();
  } else {
    render();
  }
}

function getFilterColor(value, selector) {
  if (value === "ALL") return "#999";

  // action filter 用 actionColor
  if (
    selector.includes("actionFilter") ||
    selector.includes("ActionFilter")
  ) {
    return actionColor(value);
  }

  // department filter 用 deptColor
  if (
    selector.includes("DeptFilter") ||
    selector.includes("deptFilter")
  ) {
    return deptColor(value);
  }

  return "#999";
}

function fillActionCheckboxGroup(selector, values) {
  const box = d3.select(selector);
  box.selectAll("*").remove();

  const valueSet = new Set(values);

  const allLabel = box.append("label")
    .attr("class", "check-item action-all-item");

  allLabel.html(`
    <input type="checkbox" value="ALL" checked>
    <span class="filter-color-dot" style="background:#999"></span>
    <span>ALL</span>
  `);

  actionGroups.forEach(group => {
    const groupActions = group.actions.filter(a => valueSet.has(a));

    if (!groupActions.length) return;

    const groupDiv = box.append("div")
      .attr("class", "action-filter-group");

    const row = groupDiv.append("div")
      .attr("class", "action-filter-row");

    const items = row.selectAll("label")
      .data(groupActions)
      .enter()
      .append("label")
      .attr("class", "check-item action-check-item");

    items.html(d => `
      <input type="checkbox" value="${d}">
      <span class="filter-color-dot" style="background:${actionColor(d)}"></span>
      <span>${d}</span>
    `);
  });

  box.selectAll('input[type="checkbox"]').on("change", function() {
    const value = this.value;

    if (value === "ALL" && this.checked) {
      box.selectAll("input").property("checked", false);
      d3.select(this).property("checked", true);
    } else if (value !== "ALL" && this.checked) {
      box.select('input[value="ALL"]').property("checked", false);
    }

    const checked = box.selectAll("input:checked").nodes();

    if (checked.length === 0) {
      box.select('input[value="ALL"]').property("checked", true);
    }

    rerenderCurrentTab();
  });
}

function getCheckedValues(selector) {
  const box = d3.select(selector);

  const values = box
    .selectAll('input[type="checkbox"]:checked')
    .nodes()
    .map(n => n.value);

  if (values.includes("ALL") || values.length === 0) {
    return null;
  }

  return new Set(values);
}

function getDateFilters() {
  const startDateValue = d3.select("#startDateFilter").property("value");
  const startClock = d3.select("#startClock").property("value");

  const endDateValue = d3.select("#endDateFilter").property("value");
  const endClock = d3.select("#endClock").property("value");

  const startDate = startDateValue
    ? new Date(`${startDateValue}T${startClock || "00:00"}`)
    : null;

  const endDate = endDateValue
    ? new Date(`${endDateValue}T${endClock || "23:59"}`)
    : null;

  return {startDate, endDate};
}

function getFilteredData() {
  const senderDeptSet = getCheckedValues("#senderDeptFilter");
  const receiverDeptSet = getCheckedValues("#receiverDeptFilter");
  const actionSet = getCheckedValues("#actionFilter");
  const {startDate, endDate} = getDateFilters();

  return currentData.filter(d => {
    if (senderDeptSet && !senderDeptSet.has(d.sender_department)) return false;
    if (actionSet && !actionSet.has(d.action)) return false;

    if (receiverDeptSet) {
      if (currentLevel === 1) {
        if (!receiverDeptSet.has(d.receiver_department)) return false;
      } else {
        const depts = d.receiver_departments || [];
        if (!depts.some(dep => receiverDeptSet.has(dep))) return false;
      }
    }

    if (startDate && d.date < startDate) return false;
    if (endDate && d.date > endDate) return false;

    return true;
  });
}

function getFileDateWindow() {
  const startValue = d3.select("#fileStartDateFilter").property("value");
  const endValue = d3.select("#fileEndDateFilter").property("value");

  if (!startValue && !endValue) {
    return {
      start: null,
      end: null
    };
  }

  const startDate = startValue || endValue;
  const endDate = endValue || startValue;

  const start = new Date(`${startDate}T00:00:00`);
  const end = new Date(`${endDate}T23:59:59`);

  return {
    start,
    end
  };
}

function eventPassesFileDateWindow(e) {
  if (!e || !e.date) return false;

  const fileWindow = getFileDateWindow();

  if (!fileWindow.start || !fileWindow.end) {
    return true;
  }

  const t = e.date instanceof Date
    ? e.date
    : new Date(e.date);

  if (Number.isNaN(t.getTime())) return false;

  return t >= fileWindow.start && t <= fileWindow.end;
}

function isMatchedFileEventInRange(e, fileQuery) {
  if (!e || !e.date) return false;

  if (!eventPassesFileDateWindow(e)) {
    return false;
  }

  if (!isFileEvent(e, fileQuery)) {
    return false;
  }

  return true;
}

function getConcreteFileWindow(events) {
  const { start, end } = getFileDateWindow();

  const minDate = d3.min(events, d => d.date);
  const maxDate = d3.max(events, d => d.date);

  return {
    start: start || minDate || new Date("2046-01-01T00:00:00"),
    end: end || maxDate || new Date("2046-12-31T23:59:59")
  };
}

function isAgentEntity(type) {
  return (type || "").toLowerCase() === "agent";
}

function isEventFileRelated(e) {
  if (dailyGraphMode !== "file") return false;

  return (
    eventPassesFileDateWindow(e) &&
    isFileEvent(e, dailyGraphFileQuery)
  );
}

function getRawEntityType(raw) {
  const s = String(raw || "").trim();

  if (/^Agent\/person:/i.test(s) || /^agent:person:/i.test(s)) {
    return "agent";
  }

  if (/^person:/i.test(s)) {
    return "person";
  }

  if (/^system:/i.test(s)) {
    return "system";
  }

  if (/^world:/i.test(s)) {
    return "world";
  }

  return "";
}

function getTypeFromRawPartiesForFocus(e, focusQuery) {
  const focusId = normalizeTracePersonId(focusQuery);

  for (const p of (e.parties || [])) {
    const pid = normalizeTracePersonId(p);

    if (pid === focusId) {
      const type = getRawEntityType(p);
      if (type) return type;
    }
  }

  return "";
}

function getTypeFromDetailsForFocus(e, focusQuery) {
  const focusId = normalizeTracePersonId(focusQuery);
  const d = e.details || {};

  const candidates = [
    d.person,
    d.from,
    d.to,
    d.target_agent,
    d.agent,
    d.sender,
    d.receiver
  ].filter(Boolean);

  for (const c of candidates) {
    if (normalizeTracePersonId(c) === focusId) {
      const type = getRawEntityType(c);
      if (type) return type;
    }
  }

  return "";
}

function normalizeNameForMatch(x) {
  return String(x || "")
    .replace(/^Agent\/person:/i, "person:")
    .replace(/^agent:person:/i, "person:")
    .replace(/^Agent\//i, "")
    .toLowerCase()
    .replace(/^person:/, "")
    .replace(/_/g, " ")
    .trim();
}

function entityMatchesFocus(id, name, focusQuery) {
  const qName = normalizeNameForMatch(focusQuery);
  const idName = normalizeNameForMatch(id);
  const displayName = normalizeNameForMatch(name);

  if (!qName) return false;

  return (
    idName === qName ||
    displayName === qName ||
    idName.includes(qName) ||
    displayName.includes(qName) ||
    qName.includes(idName) ||
    qName.includes(displayName)
  );
}

function getEntityTypeForFocus(e, focusQuery) {
  // 1. sender match：同时看 sender_id 和 sender_name
  if (
    entityMatchesFocus(
      e.sender_id,
      e.sender_name,
      focusQuery
    )
  ) {
    return e.sender_type || "";
  }

  // 2. receiver match：同时看 receiver.id 和 receiver.name
  for (const r of (e.receivers || [])) {
    if (
      entityMatchesFocus(
        r.id,
        r.name,
        focusQuery
      )
    ) {
      return r.type || "";
    }
  }

  // 3. fallback：从 raw parties 判断 Agent/person
  const qName = normalizeNameForMatch(focusQuery);

  for (const p of (e.parties || [])) {
    const pName = normalizeNameForMatch(p);

    if (
      pName === qName ||
      pName.includes(qName) ||
      qName.includes(pName)
    ) {
      const raw = String(p || "");

      if (/^Agent\/person:/i.test(raw) || /^agent:person:/i.test(raw)) {
        return "agent";
      }

      if (/^person:/i.test(raw)) {
        return "person";
      }
    }
  }

  return "";
}

function eventPassesCurrentFilters(e) {
  const senderDeptSet = getCheckedValues("#dailySenderDeptFilter");
const receiverDeptSet = getCheckedValues("#dailyReceiverDeptFilter");
const actionSet = getCheckedValues("#dailyActionFilter");
  const {startDate, endDate} = getDateFilters();

  if (senderDeptSet && !senderDeptSet.has(e.sender_department)) return false;
  if (actionSet && !actionSet.has(e.action)) return false;

  if (receiverDeptSet) {
    const depts = e.receiver_departments || [];
    if (!depts.some(dep => receiverDeptSet.has(dep))) return false;
  }

  if (startDate && e.date < startDate) return false;
  if (endDate && e.date > endDate) return false;

  return true;
}

function eventPassesDailyGraphBaseFilters(e) {
  const senderDeptSet = getCheckedValues("#dailySenderDeptFilter");
  const receiverDeptSet = getCheckedValues("#dailyReceiverDeptFilter");
  const actionSet = getCheckedValues("#dailyActionFilter");

  if (senderDeptSet && !senderDeptSet.has(e.sender_department)) return false;
  if (actionSet && !actionSet.has(e.action)) return false;

  if (receiverDeptSet) {
    const depts = e.receiver_departments || [];
    if (!depts.some(dep => receiverDeptSet.has(dep))) return false;
  }

  return true;
}

/* ---------- Overview ---------- */

function render() {
  currentTab = "overview";
  currentLevel = 1;
  currentData = level1Data;

  if (!currentData.length || !width) return;

  visibleData = getFilteredData();

  if (!visibleData.length) {
    clearCanvasAndSvg(document.getElementById("container").clientHeight);
    return;
  }

  const times = d3.extent(visibleData, d => d.date);
  const yDomain = Array.from(new Set(visibleData.map(d => d.pair))).sort();

  xScale = d3.scaleTime()
    .domain(times)
    .range([margin.left, width - margin.right]);

  const chartHeight = buildGroupedYMap(yDomain);

  height = Math.max(
    document.getElementById("container").clientHeight,
    chartHeight
  );

  setupCanvasSvg(height);
  clearCanvasAndSvg(height);

  yScale = key => yMap.get(key);
  colorScale = actionColor;

  drawAxes(yDomain);
  drawCanvasPoints();
  buildQuadtree();
}

function buildGroupedYMap(yDomain) {
  yMap = new Map();

  const innerGap = 11;
  const groupGap = 26;

  const groups = d3.group(yDomain, d => {
    if (d.includes(" → ")) return d.split(" → ")[0];
    return d;
  });

  let y = margin.top;
  const senderGroups = Array.from(groups.keys()).sort();

  for (const sender of senderGroups) {
    const rows = groups.get(sender).sort();

    for (const row of rows) {
      yMap.set(row, y);
      y += innerGap;
    }

    y += groupGap;
  }

  return y + margin.bottom + 30;
}

function setupCanvasSvg(h) {
  canvas.width = width * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;

  canvas.style.width = width + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(
    window.devicePixelRatio,
    0,
    0,
    window.devicePixelRatio,
    0,
    0
  );

  svg.attr("width", width).attr("height", h);
}

function clearCanvasAndSvg(h) {
  ctx.clearRect(0, 0, width, h);
  svg.selectAll("*").remove();
}

function drawAxes(yDomain) {
  const xAxis = d3.axisBottom(xScale)
    .ticks(8)
    .tickFormat(d3.timeFormat("%m-%d %H:%M"));

  svg.append("g")
    .attr("transform", `translate(0, ${height - margin.bottom})`)
    .call(xAxis);

  const yLabelG = svg.append("g")
    .attr("transform", `translate(${margin.left}, 0)`);

  for (const label of yDomain) {
    const y = yScale(label);
    if (y === undefined) continue;

    yLabelG.append("text")
      .attr("x", -8)
      .attr("y", y)
      .attr("text-anchor", "end")
      .attr("dominant-baseline", "middle")
      .attr("font-size", "10px")
      .text(label);
  }
}

function drawCanvasPoints() {
  const maxCount = d3.max(visibleData, d => d.count || 1);

  const hScale = d3.scaleSqrt()
    .domain([1, maxCount])
    .range([2, 8]);

  for (const d of visibleData) {
    const x = xScale(d.date);
    const y = yScale(d.pair);

    d._x = x;
    d._y = y;

    const segW = 2;
    const segH = hScale(d.count || 1);

    d._segW = segW;
    d._segH = segH;

    drawLineNodeGlyph(x, y, segW, segH, colorScale(d.action));

    if (d._highlightPerson) {
      drawSelectedPersonTailsOnSegment(x, y, segW, segH, d);
    }
  }
}

function drawLineNodeGlyph(x, y, w, h, color) {
  const radius = h / 2;

  ctx.save();
  ctx.globalAlpha = 0.78;
  ctx.fillStyle = color;

  roundRect(ctx, x - w / 2, y - h / 2, w, h, radius);

  ctx.fill();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);

  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

const FILE_EXT_RE = /\.(md|txt|csv|json|xlsx?|docx?|pdf|png|jpg|jpeg|log|yaml|yml|html|xml)$/i;

function collectStringsDeep(obj, result = []) {
  if (obj == null) return result;

  if (typeof obj === "string") {
    result.push(obj);
    return result;
  }

  if (Array.isArray(obj)) {
    obj.forEach(v => collectStringsDeep(v, result));
    return result;
  }

  if (typeof obj === "object") {
    Object.values(obj).forEach(v => collectStringsDeep(v, result));
  }

  return result;
}

function looksLikeFileName(s) {
  if (!s || typeof s !== "string") return false;

  const v = s.trim();

  // 排除明显的 person / agent / system id
  if (v.startsWith("person:")) return false;
  if (v.startsWith("Agent/person:")) return false;
  if (v.startsWith("system:")) return false;
  if (v.startsWith("world:")) return false;

  // path/to/file.ext 或 file.ext
  const lastPart = v.split("/").pop();

  return FILE_EXT_RE.test(lastPart);
}

function extractFileNames(e) {

  if (e.file_refs && e.file_refs.length) {
  return e.file_refs;
}
  const files = [];

  FILE_FIELD_PATHS.forEach(path => {
    const values = getValuesByPath(e, path);

    values.forEach(value => {
      if (typeof value === "string" && looksLikeFileName(value)) {
        files.push(value.trim());
      }
    });
  });

  return Array.from(new Set(files));
}

function containsFileKeyword(obj, keyword) {

if (!obj) return false;

if (typeof obj === "string") {
  return obj.toLowerCase().includes(
    keyword.toLowerCase()
  );
}

if (Array.isArray(obj)) {
  return obj.some(v =>
    containsFileKeyword(v, keyword)
  );
}

if (typeof obj === "object") {
  return Object.values(obj).some(v =>
    containsFileKeyword(v, keyword)
  );
}

return false;
}

function isFileEvent(e, query) {
  if (!query) return false;

  const q = query.toLowerCase().trim();
  if (!q) return false;

  const files = extractFileNames(e);

  return files.some(file =>
    file.toLowerCase().includes(q)
  );
}

function getPeopleForFile(fileQuery, fileEvents) {
  const peopleMap = new Map();

  fileEvents.forEach(e => {
    if (e.sender_id) {
      peopleMap.set(
        (e.sender_id || "").replace(/^Agent\//, "").toLowerCase(),
        {
          id: e.sender_id,
          name: e.sender_name || e.sender_id,
          type: e.sender_type,
          department: e.sender_department
        }
      );
    }

    (e.receivers || []).forEach(r => {
      if (r.id) {
        peopleMap.set(
          (r.id || "").replace(/^Agent\//, "").toLowerCase(),
          {
            id: r.id,
            name: r.name || r.id,
            type: r.type,
            department: r.department
          }
        );
      }
    });
  });

  return Array.from(peopleMap.values());
}

function drawSelectedPersonTailsOnSegment(x, y, w, h, d) {
  if (d._isSenderTrace) {
    drawSenderTailOnSegment(x, y, w, h, deptColor(d.sender_department));
  }

  if (d._isReceiverTrace) {
    drawReceiverTailOnSegment(x, y, w, h, deptColor(d.receiver_department));
  }
}

function getTraceArrowColor(isSelectedTrace) {
  return isSelectedTrace ? "#c04fb3" : "#b8b8b8";
}

function isExpandedTraceNode(sender, day, x, y, rootWindow, eventDate) {
  if (!rootWindow || !eventDate) return false;

  const focusId = (sender.id || sender.name || "")
    .replace(/^Agent\//, "")
    .toLowerCase();

  const clickedTime = eventDate.toISOString();

  const key = [
    focusId,
    day,
    x.toFixed(1),
    y.toFixed(1),
    rootWindow.start.toISOString(),
    clickedTime
  ].join("||");

  return dailyGraphExpansions.some(exp => exp.key === key);
}

function drawSenderTailOnSegment(x, y, w, h, color) {
  const left = x - w / 2;
  const top = y - h / 2;
  const r = Math.max(h, 4);

  ctx.save();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.78;

  ctx.beginPath();
  ctx.moveTo(left, top);
  ctx.bezierCurveTo(left - r * 0.3, top - r * 0.6, left - r * 0.15, top - r * 1.4, left + r * 0.35, top - r * 2.0);
  ctx.bezierCurveTo(left + r * 0.65, top - r * 1.2, left + r * 0.55, top - r * 0.45, left + r * 0.15, top);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawReceiverTailOnSegment(x, y, w, h, color) {
  const right = x + w / 2;
  const bottom = y + h / 2;
  const r = Math.max(h, 4);

  ctx.save();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.78;

  ctx.beginPath();
  ctx.moveTo(right, bottom);
  ctx.bezierCurveTo(right + r * 0.35, bottom + r * 0.8, right + r * 0.25, bottom + r * 1.8, right - r * 0.25, bottom + r * 2.8);
  ctx.bezierCurveTo(right - r * 0.65, bottom + r * 1.8, right - r * 0.45, bottom + r * 0.65, right - r * 0.05, bottom);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function buildQuadtree() {
  quadtree = d3.quadtree()
    .x(d => d._x)
    .y(d => d._y)
    .addAll(visibleData);
}

canvas.addEventListener("mousemove", event => {
  if (currentTab !== "overview") return;
  if (!quadtree) return;

  const rect = canvas.getBoundingClientRect();
  const mx = event.clientX - rect.left;
  const my = event.clientY - rect.top;

  const d = quadtree.find(mx, my, 12);

  if (!d) {
    tooltip.style("display", "none");
    return;
  }

  tooltip
    .style("display", "block")
    .style("left", `${event.clientX + 16}px`)
    .style("top", `${event.clientY + 16}px`)
    .html(makeTooltip(d));
});

function makeTooltip(d) {
  const eventType = d.action || "unknown";
  const dateTime = d.first_time || d.time || d.time_bin || "";

  const sender =
    d.sender_name ||
    d.sender_id ||
    d.sender_department ||
    "Unknown sender";

  let receivers = "Unknown receiver";

  if (d.receiver_names && d.receiver_names.length) {
    receivers = d.receiver_names.join(", ");
  } else if (d.receivers && d.receivers.length) {
    receivers = d.receivers.map(r => r.name || r.id || r).join(", ");
  } else if (d.receiver_ids && d.receiver_ids.length) {
    receivers = d.receiver_ids.join(", ");
  } else if (d.receiver_department) {
    receivers = d.receiver_department;
  } else if (d.receiver_departments && d.receiver_departments.length) {
    receivers = d.receiver_departments.join(", ");
  }

  return `
    <b>Event type:</b> ${eventType}<br>
    <b>Sender:</b> ${sender}<br>
    <b>Receiver:</b> ${receivers}<br>
    <b>Date & time:</b> ${dateTime}<br>
    <b>Count:</b> ${d.count || 1}
  `;
}

/* ---------- Person matching ---------- */

function normalizeEntityId(id) {
  return (id || "")
    .replace(/^Agent\//, "")
    .toLowerCase();
}

function normalizePersonNameForMatch(x) {
  return String(x || "")
    .replace(/^Agent\/person:/i, "person:")
    .replace(/^agent:person:/i, "person:")
    .replace(/^Agent\//i, "")
    .toLowerCase()
    .replace(/^person:/, "")
    .replace(/_/g, " ")
    .trim();
}

function resolvePersonQueryToCanonicalId(query, events) {
  const qName = normalizePersonNameForMatch(query);
  const qId = normalizeTracePersonId(query);

  if (!qName) return qId;

  for (const e of events || []) {
    const senderId = normalizeTracePersonId(e.sender_id);
    const senderName = normalizePersonNameForMatch(e.sender_name);
    const senderIdName = normalizePersonNameForMatch(e.sender_id);

    if (
      senderId &&
      (
        senderId === qId ||
        senderName === qName ||
        senderIdName === qName
      )
    ) {
      return senderId;
    }

    for (const r of (e.receivers || [])) {
      const rid = normalizeTracePersonId(r.id);
      const rName = normalizePersonNameForMatch(r.name);
      const rIdName = normalizePersonNameForMatch(r.id);

      if (
        rid &&
        (
          rid === qId ||
          rName === qName ||
          rIdName === qName
        )
      ) {
        return rid;
      }
    }
  }

  return "person:" + qName.replace(/\s+/g, "_");
}

function isPersonSender(e, q) {
  const target = normalizeEntityId(q);
  const senderId = normalizeEntityId(e.sender_id);
  const senderName = (e.sender_name || "").toLowerCase();

  return (
    senderId.includes(target) ||
    senderName.includes(target)
  );
}

function isPersonReceiver(e, q) {
  const target = normalizeEntityId(q);

  return (e.receivers || []).some(r => {
    const rid = normalizeEntityId(r.id);
    const rname = (r.name || "").toLowerCase();

    return (
      rid.includes(target) ||
      rname.includes(target)
    );
  });
}

/* ---------- Overview person trace ---------- */

function getPersonAnchorLevel1(d) {
  const w = d._segW || 2;
  const h = d._segH || 4;
  const r = Math.max(h, 4);

  if (d._isSenderTrace && !d._isReceiverTrace) {
    return {
      x: d._x - w / 2 + r * 0.35,
      y: d._y - h / 2 - r * 2.0
    };
  }

  if (d._isReceiverTrace && !d._isSenderTrace) {
    return {
      x: d._x + w / 2 - r * 0.25,
      y: d._y + h / 2 + r * 2.8
    };
  }

  return {
    x: d._x,
    y: d._y
  };
}

function makeLevel1Key(d) {
  return [
    d.time_bin,
    d.sender_department,
    d.receiver_department,
    d.action
  ].join("||");
}

function makeEventToLevel1Key(e, receiverDepartment) {
  return [
    e.time_bin,
    e.sender_department,
    receiverDepartment,
    e.action
  ].join("||");
}

function renderTrace() {
  currentTab = "overview";
  currentLevel = 1;
  currentData = level1Data;

  level1Data.forEach(d => {
    d._highlightPerson = false;
    d._isSenderTrace = false;
    d._isReceiverTrace = false;
  });

  render();

  const query = d3.select("#overviewPersonInput")
    .property("value")
    .trim()
    .toLowerCase();

  if (!query) return;

  const nodeByKey = new Map();

  visibleData.forEach(d => {
    nodeByKey.set(makeLevel1Key(d), d);
  });

  const matchedEvents = eventsData
    .filter(e => isPersonSender(e, query) || isPersonReceiver(e, query))
    .filter(eventPassesCurrentFilters)
    .sort((a, b) => a.date - b.date);

  const traceNodes = [];

  matchedEvents.forEach(e => {
    const senderMatch = isPersonSender(e, query);
    const receiverMatch = isPersonReceiver(e, query);

    const receiverDepartments =
      e.receiver_departments && e.receiver_departments.length
        ? e.receiver_departments
        : ["Unknown Receiver Department"];

    receiverDepartments.forEach(receiverDept => {
      const key = makeEventToLevel1Key(e, receiverDept);
      const node = nodeByKey.get(key);

      if (!node) return;

      node._highlightPerson = true;
      if (senderMatch) node._isSenderTrace = true;
      if (receiverMatch) node._isReceiverTrace = true;

      if (!traceNodes.includes(node)) {
        traceNodes.push(node);
      }
    });
  });

  traceNodes.sort((a, b) => a.date - b.date);

  ctx.clearRect(0, 0, width, height);
  drawCanvasPoints();

  svg.selectAll(".trace-layer").remove();

  const g = svg.append("g")
    .attr("class", "trace-layer");

  if (!traceNodes.length) return;

  const tracePoints = traceNodes.map(d => {
    const anchor = getPersonAnchorLevel1(d);
    return {
      ...d,
      anchorX: anchor.x,
      anchorY: anchor.y
    };
  });

  const line = d3.line()
    .x(d => d.anchorX)
    .y(d => d.anchorY)
    .curve(d3.curveMonotoneX);

  g.append("path")
    .datum(tracePoints)
    .attr("d", line)
    .attr("fill", "none")
    .attr("stroke", "#9aa0a6")
    .attr("stroke-width", 0.1)
    .attr("opacity", 0.45)
    .attr("stroke-linecap", "round")
    .attr("stroke-linejoin", "round");

  drawPersonEventTimeline(matchedEvents, query);
}

function escapeHtml(value) {
  if (value == null) return "";

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function valueAt(obj, path) {
  return path.split(".").reduce((cur, key) => {
    if (cur == null) return undefined;
    return cur[key];
  }, obj);
}

function cleanId(x) {
  if (!x) return "";
  return String(x)
    .replace(/^Agent\//, "")
    .replace(/^person:/, "")
    .replace(/^system:/, "system:")
    .replace(/^world:/, "world:")
    .replace(/_/g, " ");
}

function fmt(v) {
  if (v == null || v === "") return "";
  if (Array.isArray(v)) return v.map(cleanId).join(", ");
  if (typeof v === "object") return JSON.stringify(v);
  return cleanId(v);
}

function row(label, value) {
  const text = fmt(value);
  if (!text) return "";
  return `<div><b>${label}:</b> ${escapeHtml(text)}</div>`;
}

function clipText(v, n = 120) {
  if (!v) return "";
  const s = String(v);
  return s.length > n ? s.slice(0, n) + "…" : s;
}

function drawPersonEventTimeline(events, query) {
  svg.selectAll(".person-event-timeline").remove();

  if (!events || !events.length) return;

  const g = svg.append("g")
    .attr("class", "person-event-timeline");

  const y = 62;
  const tickY = y + 18;

  g.append("text")
    .attr("x", margin.left)
    .attr("y", 22)
    .attr("font-size", 13)
    .attr("font-weight", "bold")
    .attr("fill", "#111")
    .text(`Person event timeline: ${query}`);

  g.append("line")
    .attr("x1", margin.left)
    .attr("x2", width - margin.right)
    .attr("y1", y)
    .attr("y2", y)
    .attr("stroke", "#777")
    .attr("stroke-width", 1)
    .attr("opacity", 0.5);

  g.selectAll("circle.event-dot")
    .data(events)
    .enter()
    .append("circle")
    .attr("class", "event-dot")
    .attr("cx", d => xScale(d.date))
    .attr("cy", d => {
      const sender = isPersonSender(d, query);
      const receiver = isPersonReceiver(d, query);

      if (sender && !receiver) return y - 12;
      if (receiver && !sender) return y + 12;
      return y;
    })
    .attr("r", 3.2)
    .attr("fill", d => colorScale(d.action))
    .attr("opacity", 0.9)
    .on("mousemove", function(event, d) {
      d3.select(this)
        .attr("r", 5)
        .attr("stroke", "#111")
        .attr("stroke-width", 1.2);

      tooltip
        .style("display", "block")
        .style("left", `${event.clientX + 16}px`)
        .style("top", `${event.clientY + 16}px`)
        .html(makeEventTimelineTooltip(d, query));
    })
    .on("mouseleave", function() {
      d3.select(this)
        .attr("r", 3.2)
        .attr("stroke", "none");

      tooltip.style("display", "none");
    });

  g.selectAll("line.event-stem")
    .data(events)
    .enter()
    .append("line")
    .attr("class", "event-stem")
    .attr("x1", d => xScale(d.date))
    .attr("x2", d => xScale(d.date))
    .attr("y1", y)
    .attr("y2", d => {
      const sender = isPersonSender(d, query);
      const receiver = isPersonReceiver(d, query);

      if (sender && !receiver) return y - 12;
      if (receiver && !sender) return y + 12;
      return y;
    })
    .attr("stroke", "#aaa")
    .attr("stroke-width", 0.6)
    .attr("opacity", 0.45);

  const grouped = d3.group(events, d => d.action);

  const actionSummary = Array.from(grouped, ([action, arr]) => ({
    action,
    count: arr.length
  }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 8);

  const legend = g.append("g")
    .attr("transform", `translate(${margin.left}, ${tickY + 22})`);

  const legendItems = legend.selectAll("g.legend-item")
    .data(actionSummary)
    .enter()
    .append("g")
    .attr("class", "legend-item")
    .attr("transform", (d, i) => {
      const col = i % 5;
      const row = Math.floor(i / 5);
      return `translate(${col * 170}, ${row * 16})`;
    });

  legendItems.append("circle")
    .attr("cx", 0)
    .attr("cy", -3)
    .attr("r", 4)
    .attr("fill", d => colorScale(d.action))
    .attr("opacity", 0.9);

  legendItems.append("text")
    .attr("x", 8)
    .attr("y", 0)
    .attr("font-size", 10)
    .attr("fill", "#111")
    .text(d => `${d.action} (${d.count})`);

  g.append("text")
    .attr("x", margin.left - 8)
    .attr("y", y - 12)
    .attr("text-anchor", "end")
    .attr("font-size", 10)
    .attr("fill", "#aaa")
    .text("sender");

  g.append("text")
    .attr("x", margin.left - 8)
    .attr("y", y + 15)
    .attr("text-anchor", "end")
    .attr("font-size", 10)
    .attr("fill", "#aaa")
    .text("receiver");
}

/* ---------- Daily graph filtering ---------- */

function getTraceWindow() {
  const dateValue = d3.select("#traceDateFilter").property("value");
  const hoursBack = Number(d3.select("#hoursBackFilter").property("value") || 6);

  if (!dateValue) return null;

  return {
    dateValue,
    hoursBack
  };
}

function buildAnchorWindowsForRoot(events, rootQuery, traceDate, hoursBack) {
  const q = rootQuery.toLowerCase();

  const dayStart = new Date(`${traceDate}T00:00:00`);
  const dayEnd = new Date(`${traceDate}T23:59:59`);

  const rootDayEvents = events
    .filter(e => {
      if (!e.date) return false;
      if (e.date < dayStart || e.date > dayEnd) return false;
      return isPersonSender(e, q) || isPersonReceiver(e, q);
    })
    .sort((a, b) => a.date - b.date);

  if (!rootDayEvents.length) return [];

  const rawStart = new Date(
    dayEnd.getTime() - hoursBack * 60 * 60 * 1000
  );

  const start = rawStart < dayStart ? dayStart : rawStart;

  return [{
    anchorEventId: "day-window",
    anchorDate: dayEnd,
    start,
    end: dayEnd
  }];
}

function buildClickedWindowForExpansion(clickedDate, parentWindow) {
  const clickedTime = clickedDate instanceof Date
    ? clickedDate
    : new Date(clickedDate);

  if (Number.isNaN(clickedTime.getTime())) {
    return parentWindow;
  }

  if (dailyGraphMode === "person") {
    const traceDate = d3.select("#traceDateFilter").property("value");
    const hoursBack =
      +d3.select("#hoursBackFilter").property("value") || 24;

    if (!traceDate) return parentWindow;

    const dayStart = new Date(`${traceDate}T00:00:00`);
    const dayEnd = new Date(`${traceDate}T23:59:59`);

    const rawStart = new Date(
      dayEnd.getTime() - hoursBack * 60 * 60 * 1000
    );

    const baseStart = rawStart < dayStart ? dayStart : rawStart;

    return {
      // 关键：outer 的 start 和 inner 一样
      start: baseStart,

      // 关键：outer 的 end 才是 clickedTime
      end: clickedTime
    };
  }

  if (dailyGraphMode === "file") {
    const fileWindow = getFileDateWindow();

    return {
      start: fileWindow.start || parentWindow.start,
      end: clickedTime
    };
  }

  return parentWindow;
}

function buildInnerWindowForExpansion(clickedDate, parentWindow) {
  if (dailyGraphMode === "person") {
    const traceDate = d3.select("#traceDateFilter").property("value");
    const hoursBack =
      +d3.select("#hoursBackFilter").property("value") || 24;

    if (!traceDate) return parentWindow;

    const dayStart = new Date(`${traceDate}T00:00:00`);
    const dayEnd = new Date(`${traceDate}T23:59:59`);

    const rawStart = new Date(
      dayEnd.getTime() - hoursBack * 60 * 60 * 1000
    );

    return {
      start: rawStart < dayStart ? dayStart : rawStart,
      end: dayEnd
    };
  }

  if (dailyGraphMode === "file") {
    const fileWindow = getFileDateWindow();

    return {
      start: fileWindow.start || parentWindow.start,
      end: fileWindow.end || parentWindow.end
    };
  }

  return parentWindow;
}

function toDateObj(d) {
  if (!d) return null;

  const t = d instanceof Date ? d : new Date(d);

  if (Number.isNaN(t.getTime())) return null;

  return t;
}

function eventInWindow(e, windowObj) {
  if (!e || !e.date || !windowObj) return false;

  const t = toDateObj(e.date);
  const start = toDateObj(windowObj.start);
  const end = toDateObj(windowObj.end);

  if (!t || !start || !end) return false;

  return t >= start && t <= end;
}

function eventInAnyAnchorWindow(e, windows) {
  return (windows || []).some(w => eventInWindow(e, w));
}

function getAnchorWindowForEvent(e) {
  if (!e || !e.date) return null;

  return (dailyGraphAnchorWindows || []).find(w =>
    eventInWindow(e, w)
  ) || null;
}

function getEventsForPersonWithinOneRootWindow(personQuery, windowObj, events) {
  const q = personQuery.toLowerCase();

  return events.filter(e => {
    if (!e || !e.date) return false;

    const isTargetPerson =
      isPersonSender(e, q) ||
      isPersonReceiver(e, q);

    if (!isTargetPerson) return false;

    if (dailyGraphMode === "person") {
      if (!windowObj) return false;
      return eventInWindow(e, windowObj);
    }

    if (dailyGraphMode === "file") {
      if (!windowObj) return false;
      return eventInWindow(e, windowObj);
    }

    return false;
  });
}

  const q = personQuery.toLowerCase();

  return dailyGraphBaseEvents.filter(e => {
    if (!eventInAnyAnchorWindow(e, dailyGraphAnchorWindows)) return false;
    return isPersonSender(e, q) || isPersonReceiver(e, q);
  });

function drawOneFileChainInOrder(
  g,
  dayEvents,
  chain,
  day,
  rootCx,
  rootCy,
  innerRadius,
  outerRadius
) {

    g,

    rootCx,
    rootCy,
    innerRadius,
    outerRadius
  );

  // 2. 顺着 chain.edges 一条一条画 expansion
  let parentX = rootCx;
  let parentY = rootCy;

  chain.edges.forEach((edge, edgeIndex) => {
    // edge.from 是下一层 focus person
    const focusPersonId = normalizeTracePersonId(edge.from);

    // 用 edge 的时间决定它在父圆上的角度
    const angle = dateToDayAngle(edge.event.date);

    const outerP = polar(
      parentX,
      parentY,
      outerRadius,
      angle
    );

    const exp = makeFileExpansionFromChainEdge({
      edge,
      day,
      focusPersonId,
      x: outerP.x,
      y: outerP.y,
      angle,
      depth: edgeIndex + 1
    });

    drawNodeExpansion(g, exp);

    // 下一层 graph 的 center 就是当前 outer node 的位置
    parentX = outerP.x;
    parentY = outerP.y;
  });
}

function makeFileExpansionFromChainEdge({
  edge,
  day,
  focusPersonId,
  x,
  y,
  angle,
  depth
}) {
  const fileWindow = dailyGraphConcreteFileWindow;

  const clickedTime = edge.event.date instanceof Date
    ? edge.event.date
    : new Date(edge.event.date);

  const outerWindow = {
    start: fileWindow.start,
    end: clickedTime
  };

  const innerWindow = {
    start: fileWindow.start,
    end: fileWindow.end
  };

  return {
    key: [
      "ordered-file-chain",
      day,
      edge.key,
      depth
    ].join("||"),

    autoFileChain: true,

    graphInstanceKey: edge.childGraphKey || null,
    chainId: edge.chainId || null,
    chainEdgeIndex: edge.chainEdgeIndex ?? depth,
    parentGraphKey: edge.parentGraphKey || null,
    edgeKey: edge.key,

    personId: focusPersonId,
    personName: focusPersonId,
    day,

    clickedX: x,
    clickedY: y,
    clickedAngle: angle,
    depth,

    clickedTime: clickedTime.toISOString(),

    windowStart: outerWindow.start.toISOString(),
    windowEnd: outerWindow.end.toISOString(),

    innerWindowStart: innerWindow.start.toISOString(),
    innerWindowEnd: innerWindow.end.toISOString(),

    parentFocus: edge.to,
    eventId: edge.eventId
  };
}

function fitDailyGraphToView(g) {
  if (keepDailyGraphZoom && savedDailyGraphViewCenter) {
    restoreViewCenterInGraphCoords(savedDailyGraphViewCenter);
    keepDailyGraphZoom = false;
    savedDailyGraphViewCenter = null;
    return;
  }

  if (!g || !svgZoom || !svg) return;

  const groupNode = g.node();
  if (!groupNode) return;

  const contentNodes = Array.from(
    groupNode.querySelectorAll(
      ".person-graph, .daily-day-label, .daily-title-label"
    )
  );

  if (!contentNodes.length) return;

  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;

  contentNodes.forEach(node => {
    let box;

    try {
      box = node.getBBox();
    } catch (err) {
      return;
    }

    if (!box || !box.width || !box.height) return;

    minX = Math.min(minX, box.x);
    minY = Math.min(minY, box.y);
    maxX = Math.max(maxX, box.x + box.width);
    maxY = Math.max(maxY, box.y + box.height);
  });

  if (
    !Number.isFinite(minX) ||
    !Number.isFinite(minY) ||
    !Number.isFinite(maxX) ||
    !Number.isFinite(maxY)
  ) {
    return;
  }

  const bbox = {
    x: minX,
    y: minY,
    width: maxX - minX,
    height: maxY - minY
  };

  const container = document.getElementById("container");

  const padding = 70;

  const scale = Math.min(
    (container.clientWidth - padding * 2) / bbox.width,
    (container.clientHeight - padding * 2) / bbox.height,
    1.25
  );

  const finalScale = Math.max(scale, 0.35);

  const x =
    container.clientWidth / 2 -
    finalScale * (bbox.x + bbox.width / 2);

  const y =
    container.clientHeight / 2 -
    finalScale * (bbox.y + bbox.height / 2);

  const t = d3.zoomIdentity
    .translate(x, y)
    .scale(finalScale);

  dailyGraphZoomTransform = t;

  svg.call(svgZoom.transform, t);
}

function autoFitDailyGraph(g) {
  const node = g.node();
  if (!node) return;

  let box;

  try {
    box = node.getBBox();
  } catch (err) {
    return;
  }

  const viewportW = document.getElementById("container").clientWidth;
  const viewportH = document.getElementById("container").clientHeight;

  let offsetX = 0;
  let offsetY = 0;

  const safeLeft = DAILY_LAYOUT_PADDING;
  const safeTop = DAILY_TITLE_SAFE_TOP + DAILY_LAYOUT_PADDING;

  if (box.x < safeLeft) {
    offsetX = safeLeft - box.x;
  }

  if (box.y < safeTop) {
    offsetY = safeTop - box.y;
  }

  const contentW = box.x + offsetX + box.width + DAILY_LAYOUT_PADDING;
  const contentH = box.y + offsetY + box.height + DAILY_LAYOUT_PADDING;

  const newWidth = Math.max(viewportW, contentW);
  const newHeight = Math.max(viewportH, contentH);

  width = newWidth;
  height = newHeight;

  setupCanvasSvg(height);
  svg.attr("width", width).attr("height", height);

  ctx.clearRect(0, 0, width, height);

  g.attr("transform", `translate(${offsetX}, ${offsetY})`);

  svg.style.width = width + "px";
}

function isParentOuterSenderEventForExpansion(e, exp, focusQuery) {
  if (dailyGraphMode !== "file") return false;
  if (!e || !exp) return false;

  // 只排除打开当前 expanded graph 的那条 parent edge
  if (String(e.id) !== String(exp.eventId)) {
    return false;
  }

  const focusId = normalizeTracePersonId(focusQuery);
  const senderId = normalizeTracePersonId(e.sender_id);
  const parentFocusId = normalizeTracePersonId(exp.parentFocus);

  const receiverIds = (e.receivers || []).map(r =>
    normalizeTracePersonId(r.id)
  );

  // 当前 expanded graph 的 focus person 是这条 event 的 sender，
  // 并且这条 event 的 receiver 是上一层 graph 的 focus。
  // 例如 Gabriel → Zoey，展开 Gabriel 时排除这条 event。
  return (
    senderId === focusId &&
    (
      !parentFocusId ||
      receiverIds.includes(parentFocusId)
    )
  );
}

function getExternalSendersForFocus(e, focusQuery) {

  const focusIsReceiver = (e.receivers || []).some(r =>

    (r.name || "").toLowerCase().includes(q)
  );

  const senderIsFocus =
    normalizeEntityId(e.sender_id).includes(q) ||
    (e.sender_name || "").toLowerCase().includes(q);

  // 只画“发给当前 focus 的外部 sender”

    return [{
      id: e.sender_id,
      name: e.sender_name,
      type: e.sender_type,
      department: e.sender_department
    }];
  }

  return [];
}

function hourToAngle(hour) {
  return -Math.PI / 2 + (hour / 24) * Math.PI * 2;
}

function dateToDayAngle(date) {
  const hour = date.getHours();
  const minute = date.getMinutes();
  const second = date.getSeconds();

  const t = hour + minute / 60 + second / 3600;

  return hourToAngle(t);
}

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function normalizeAngle(a) {
  const twoPi = Math.PI * 2;
  return ((a % twoPi) + twoPi) % twoPi;
}

function makeArcPath(cx, cy, r, startAngle, endAngle) {
  const twoPi = Math.PI * 2;

  let start = normalizeAngle(startAngle);
  let end = normalizeAngle(endAngle);

  if (end < start) end += twoPi;

  const largeArc = end - start > Math.PI ? 1 : 0;

  const p1 = polar(cx, cy, r, start);
  const p2 = polar(cx, cy, r, end);

  return `
    M ${p1.x} ${p1.y}
    A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y}
  `;
}

function getActivityArcAngles(events) {
  const pad = 0.14; // 单点时的小弧长度，可调大/小

  if (!events || !events.length) return null;

  const angles = events
    .map(e => normalizeAngle(dateToDayAngle(e.date)))
    .sort((a, b) => a - b);

  if (angles.length === 1) {
    return {
      start: angles[0] - pad,
      end: angles[0] + pad
    };
  }

  // 找最大空档，然后画它的反面：也就是覆盖所有节点的连续弧
  let maxGap = -1;
  let gapStartIndex = 0;

  for (let i = 0; i < angles.length; i++) {
    const a1 = angles[i];
    const a2 = angles[(i + 1) % angles.length] + (i === angles.length - 1 ? Math.PI * 2 : 0);
    const gap = a2 - a1;

    if (gap > maxGap) {
      maxGap = gap;
      gapStartIndex = i;
    }
  }

  const start = angles[(gapStartIndex + 1) % angles.length];
  let end = angles[gapStartIndex];

  if (end < start) end += Math.PI * 2;

  return { start, end };
}

function drawActivityArc(g, cx, cy, r, events, color = "#eeeeee") {
  const arc = getActivityArcAngles(events);
  if (!arc) return;

  g.append("path")
    .attr("d", makeArcPath(cx, cy, r, arc.start, arc.end))
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 0.2)
    .attr("stroke-linecap", "round")
    .attr("opacity", 0.9);
}

function getArcExtentFromEvents(events, padMinutes = 5) {
  const validDates = (events || [])
    .map(e => e.date)
    .filter(d => d instanceof Date && !Number.isNaN(d.getTime()))
    .sort((a, b) => a - b);

  if (!validDates.length) return null;

  const first = validDates[0];
  const last = validDates[validDates.length - 1];

  const padMs = padMinutes * 60 * 1000;

  return {
    start: new Date(first.getTime() - padMs),
    end: new Date(last.getTime() + padMs),
    first,
    last
  };
}

function drawOuterArc(
  g,
  cx,
  cy,
  r,
  startDate,
  endDate,
  color = "#eeeeee",
  opacity = 0.4
) {
  if (
    !(startDate instanceof Date) ||
    !(endDate instanceof Date) ||
    Number.isNaN(startDate.getTime()) ||
    Number.isNaN(endDate.getTime())
  ) {
    return;
  }

  // -------------------------------
  // 1. 细 arc：完整 outer node 动态范围
  // -------------------------------
  const startAngle = dateToDayAngle(startDate);
  const endAngle = dateToDayAngle(endDate);

  g.append("path")
    .attr(
      "d",
      makeArcPath(
        cx,
        cy,
        r,
        startAngle,
        endAngle
      )
    )
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 0.2)
    .attr("stroke-linecap", "round")
    .attr("opacity", opacity)
    .attr("pointer-events", "none")
    .attr("class", "daily-outer-activity-arc");

  // -------------------------------
  // 2. 加粗 arc：只画动态范围和 08:00–17:00 的交集
  // -------------------------------
  const workStart = new Date(startDate);
  workStart.setHours(8, 0, 0, 0);

  const workEnd = new Date(startDate);
  workEnd.setHours(17, 0, 0, 0);

  const boldStart = new Date(
    Math.max(startDate.getTime(), workStart.getTime())
  );

  const boldEnd = new Date(
    Math.min(endDate.getTime(), workEnd.getTime())
  );

  // 没有交集就不画粗 arc
  if (boldStart.getTime() >= boldEnd.getTime()) {
    return;
  }

  const boldStartAngle = dateToDayAngle(boldStart);
  const boldEndAngle = dateToDayAngle(boldEnd);

  g.append("path")
    .attr(
      "d",
      makeArcPath(
        cx,
        cy,
        r,
        boldStartAngle,
        boldEndAngle
      )
    )
    .attr("fill", "none")
    .attr("stroke", color)
    .attr("stroke-width", 0.7)
    .attr("stroke-linecap", "round")
    .attr("opacity", opacity * 0.75)
    .attr("pointer-events", "none")
    .attr("class", "daily-workhour-arc");
}

function centerFromPointOnCircle(px, py, r, angle) {
  return {
    x: px - r * Math.cos(angle),
    y: py - r * Math.sin(angle)
  };
}

function showTimeLabel(g, cx, cy, radius, angle, e) {
  g.selectAll(".hover-time-label").remove();

  const p = polar(cx, cy, radius + 18, angle);
  const timeText = d3.timeFormat("%H:%M")(e.date);

  g.append("text")
    .attr("class", "hover-time-label")
    .attr("x", p.x)
    .attr("y", p.y)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", 10)
    .attr("font-weight", "bold")
    .attr("fill", "#111")
    .attr("pointer-events", "none")
    .text(timeText);
}

function hideTimeLabel(g) {
  g.selectAll(".hover-time-label").remove();
}

function drawPersonDisk(g, cx, cy, radius, focusQuery, events) {
  const dept = getPersonDepartmentFromEvents(events, focusQuery);
  const color = deptColor(dept);

  g.append("circle")
    .attr("cx", cx)
    .attr("cy", cy)
    .attr("r", radius)
    .attr("fill", color)
    .attr("opacity", 0.2)
    .attr("pointer-events", "none");

  return color;
}

function getDailyEventType(e) {
  return (
    e?.action ||
    e?.short_name ||
    e?.type ||
    e?.event_type ||
    "unknown"
  );
}

function getDailyEventColor(e) {
  const type = getDailyEventType(e);
  return actionColorMap[type] || actionColorMap.unknown || "#d0d0d0";
}

function getPersonDepartmentFromEvents(events, focusQuery) {
  for (const e of events) {
    const dept = getPersonDepartmentFromEvent(e, focusQuery);
    if (dept && dept !== "Unknown Department") return dept;
  }
  return "Unknown Department";
}

function drawTinyArrow(g, x1, y1, x2, y2, color, opacity = 0.75, width = 1, arrowSize = 4) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);

  if (len === 0) return;

  const ux = dx / len;
  const uy = dy / len;

  const endX = x2 - ux * 4;
  const endY = y2 - uy * 4;

  g.append("line")
    .attr("x1", x1)
    .attr("y1", y1)
    .attr("x2", endX)
    .attr("y2", endY)
    .attr("stroke", color)
    .attr("stroke-width", width)
    .attr("opacity", opacity)
    .attr("pointer-events", "none"); 

  const leftX = endX - ux * arrowSize - uy * arrowSize * 0.6;
  const leftY = endY - uy * arrowSize + ux * arrowSize * 0.6;
  const rightX = endX - ux * arrowSize + uy * arrowSize * 0.6;
  const rightY = endY - uy * arrowSize - ux * arrowSize * 0.6;

  g.append("path")
    .attr("d", `M ${endX} ${endY} L ${leftX} ${leftY} L ${rightX} ${rightY} Z`)
    .attr("fill", color)
    .attr("opacity", opacity)
    .attr("pointer-events", "none");
}
